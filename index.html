  // ── Login com hash SHA-256 (senha não fica visível no código) ──
  (function(){
    // Hashes SHA-256 — a senha real nunca aparece aqui
    const H_USER  = 'f9f3b24d21ce46eede39cf58d4a0e6a2de3cf0cbc355d1fbeb84a398f74cbce6'; // e-mail
    const H_SENHA = '75e580b820c0170ce2b3bdc4ea722cdf47fd5d884c573847c55012e22a1d2adf'; // senha
    const KEY     = 'painel_auth';
    if (sessionStorage.getItem(KEY) === 'ok') return;
    document.body.style.display='none';
    const overlay = document.createElement('div');
    overlay.style.cssText='position:fixed;inset:0;background:#f8fafc;display:flex;align-items:center;justify-content:center;z-index:9999;font-family:Inter,sans-serif';
    overlay.innerHTML=`
      <div style="background:#fff;border-radius:16px;border:1px solid #e2e8f0;box-shadow:0 8px 32px rgba(0,0,0,.08);padding:40px 36px;width:340px;text-align:center">
        <div style="width:52px;height:52px;background:#eef2ff;border-radius:14px;display:flex;align-items:center;justify-content:center;margin:0 auto 20px;font-size:26px">🔒</div>
        <h2 style="margin:0 0 6px;font-size:20px;font-weight:700;color:#0f172a">Painel de Marketing</h2>
        <p style="margin:0 0 24px;font-size:13px;color:#64748b">Helena CRM · Acesso restrito</p>
        <input id="login-user" type="text" placeholder="Usuário" autocomplete="username"
          style="width:100%;box-sizing:border-box;padding:11px 14px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:Inter,sans-serif;outline:none;margin-bottom:10px;color:#0f172a"/>
        <input id="login-senha" type="password" placeholder="Senha" autocomplete="current-password"
          style="width:100%;box-sizing:border-box;padding:11px 14px;border:1px solid #e2e8f0;border-radius:9px;font-size:14px;font-family:Inter,sans-serif;outline:none;margin-bottom:12px;color:#0f172a"/>
        <button id="login-btn"
          style="width:100%;padding:11px;background:#6366f1;color:#fff;border:none;border-radius:9px;font-size:14px;font-weight:600;cursor:pointer;font-family:Inter,sans-serif">
          Entrar
        </button>
        <p id="login-erro" style="margin:10px 0 0;font-size:12px;color:#ef4444;display:none">Usuário ou senha incorretos. Tente novamente.</p>
      </div>`;
    document.body.appendChild(overlay);
    async function sha256(str){
      const buf=await crypto.subtle.digest('SHA-256',new TextEncoder().encode(str));
      return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
    }
    async function tentar(){
      const u=document.getElementById('login-user').value.trim();
      const v=document.getElementById('login-senha').value;
      const hu=await sha256(u);
      const hv=await sha256(v);
      if(hu===H_USER && hv===H_SENHA){
        sessionStorage.setItem(KEY,'ok');
        overlay.remove();
        document.body.style.display='';
      } else {
        document.getElementById('login-erro').style.display='block';
        document.getElementById('login-senha').value='';
        document.getElementById('login-senha').focus();
      }
    }
    document.getElementById('login-btn').onclick=tentar;
    document.getElementById('login-senha').addEventListener('keydown',function(e){if(e.key==='Enter')tentar();});
    document.getElementById('login-user').addEventListener('keydown',function(e){if(e.key==='Enter')document.getElementById('login-senha').focus();});
    setTimeout(()=>{ document.body.style.display=''; overlay.style.display='flex'; },100);
  })();
  </script>

    const ITC={indigo:'#4338ca',green:'#047857',amber:'#b45309',purple:'#7c3aed',cyan:'#0e7490',red:'#b91c1c'};

    const InfoTip=({texto})=>{
      const [show,setShow]=React.useState(false);
      return (
        <span style={{position:'relative',display:'inline-flex',alignItems:'center',verticalAlign:'middle'}}>
          <span onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
            style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
              width:14,height:14,borderRadius:'50%',background:'#e2e8f0',color:'#64748b',
              fontSize:8,fontWeight:800,cursor:'help',marginLeft:5,flexShrink:0,
              lineHeight:1,userSelect:'none',transition:'background .15s'
            }}>i</span>
          {show&&(
            <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',
              background:'#1e293b',color:'#cbd5e1',fontSize:11,lineHeight:1.55,
              padding:'10px 13px',borderRadius:9,width:240,zIndex:999,
              boxShadow:'0 4px 20px rgba(0,0,0,.3)',pointerEvents:'none',whiteSpace:'normal'}}>
              <div style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
                width:10,height:6,background:'#1e293b',clipPath:'polygon(0 0,100% 0,50% 100%)'}}/>
              {texto}
            </div>
          )}
        </span>
      );
    };

    const MetricCard=({title,value,sub,trend,cor='indigo',icon,info})=>(
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',margin:0}}>
            {title}{info&&<InfoTip texto={info}/>}
          </p>
          {icon&&<div style={{background:IBG[cor],color:ITC[cor],padding:7,borderRadius:8,display:'flex'}}>{icon}</div>}
        </div>
        <p style={{fontSize:26,fontWeight:800,color:'#0f172a',margin:'6px 0 2px'}}>{value}</p>
        {sub&&<p style={{fontSize:11,color:'#94a3b8',margin:0}}>{sub}</p>}
        {trend!==undefined&&(
          <span className={trend>=0?'badge-up':'badge-dn'} style={{display:'inline-block',marginTop:6}}>
            {trend>=0?'↑':'↓'} {Math.abs(trend)}% vs. anterior
          </span>
        )}
      </div>
    );

    const Bloco=({titulo,sub,children,csvDados,csvNome,info})=>(
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <h4 style={{fontSize:13,fontWeight:700,color:'#1e293b',margin:0}}>
              {titulo}{info&&<InfoTip texto={info}/>}
            </h4>
            {sub&&<p style={{fontSize:11,color:'#94a3b8',margin:'2px 0 0'}}>{sub}</p>}
          </div>
          {csvDados&&<button onClick={()=>exportarCSV(csvDados,csvNome)}
            style={{fontSize:11,border:'1px solid #c7d2fe',color:'#6366f1',background:'none',borderRadius:7,padding:'4px 10px',cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
            ↓ CSV</button>}
        </div>
        {children}
      </div>
    );

    const Svg=({d,s=18})=><svg style={{width:s,height:s}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={d}/></svg>;
    const IUsers=()=><Svg d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>;
    const IAds=()=><Svg d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>;
    const IOrg=()=><Svg d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>;
    const IWL=()=><Svg d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>;
    const IEye=()=><Svg d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>;
    const IClick=()=><Svg d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/>;
    const IMail=()=><Svg d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>;
    const IChart=()=><Svg d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>;
    const IDl=()=><Svg d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>;
    const ICal=()=><Svg d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>;

    /* ══════════════════════════════════════════════
       TABELA PADRÃO
    ══════════════════════════════════════════════ */

    const Tabela=({cols,rows,renderRow})=>(
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:'1px solid #f1f5f9'}}>
            {cols.map((c,i)=>(
              <th key={i} style={{padding:'8px 12px',fontSize:10,fontWeight:700,color:'#94a3b8',
                textTransform:'uppercase',textAlign:c.right?'right':'left'}}>{c.label}</th>
            ))}
          </tr></thead>
          <tbody>{rows.map((r,i)=>(
            <tr key={i} style={{borderBottom:'1px solid #f8fafc'}}>{renderRow(r,i)}</tr>
          ))}</tbody>
        </table>
      </div>
    );

    const Td=({children,right,mono,bold})=>(
      <td style={{padding:'9px 12px',textAlign:right?'right':'left',
        fontFamily:mono?'monospace':'Inter',fontSize:mono?12:13,
        fontWeight:bold?700:400,color:bold?'#0f172a':'#374151'}}>{children}</td>
    );

    /* ══════════════════════════════════════════════
       ABA 1 — LEADS
       ⚠ Segmentação CF/WL só da planilha Helena CRM
    ══════════════════════════════════════════════ */

    const AbaLeads=({de,ate,tipo,api})=>{
      const [origem,setOrigem]=useState('all');           // all | pago | organico | sem_origem
      const ld = api?.leads || {};
      const hasLeads = (ld.porMes||[]).length > 0;

      const toMK = d => d ? String(d.getFullYear()) + String(d.getMonth()+1).padStart(2,'0') : '';
      const startKey = toMK(de), endKey = toMK(ate);
      const inRange = mk => (!startKey||mk>=startKey) && (!endKey||mk<=endKey);

      // ── porCanalMes é a base mestre: tem mês × origem × tipo × etapa ──
      const cmAll = (ld.porCanalMes||[]).filter(c=>inRange(c.mesKey));      // período (todas as origens)
      const cm    = cmAll.filter(c => origem==='all' || c.tipoOrigem===origem); // + filtro de origem

      // pega o campo certo conforme o filtro de tipo (Todos / CF / WL)
      const pick    = (c,base)=> tipo==='cliente_final'?(c['cf_'+base]||0): tipo==='white_label'?(c['wl_'+base]||0):(c[base]||0);
      const pickTot = c => tipo==='cliente_final'?(c.cf||0): tipo==='white_label'?(c.wl||0):(c.total||c.count||0);
      const agg = rows => { const o={total:0,lead:0,mql:0,sql:0,ganho:0,perdido:0};
        rows.forEach(c=>{ o.total+=pickTot(c); o.lead+=pick(c,'lead'); o.mql+=pick(c,'mql'); o.sql+=pick(c,'sql'); o.ganho+=pick(c,'ganho'); o.perdido += tipo==='all'?(c.perdido||0):0; });
        return o; };

      const A = agg(cm);
      const total=A.total, mqlMais=A.mql+A.sql+A.ganho, sqlMais=A.sql+A.ganho, ganho=A.ganho, perdido=A.perdido;
      const taxaGanho = total? ganho/total*100 : 0;

      // ── por origem (sempre os 3 grupos; respeita período + tipo, ignora filtro de origem) ──
      const grupos = [
        {key:'pago',       label:'Pago / Ads', cor:'#ef4444'},
        {key:'organico',   label:'Orgânico',   cor:'#10b981'},
        {key:'sem_origem', label:'Sem origem', cor:'#6366f1'},
      ];
      const porGrupo = grupos.map(g=>{ const a=agg(cmAll.filter(c=>c.tipoOrigem===g.key));
        return {...g, ...a, mqlMais:a.mql+a.sql+a.ganho, sqlMais:a.sql+a.ganho, taxa:a.total?a.ganho/a.total*100:0}; });
      const totalGeral = porGrupo.reduce((s,g)=>s+g.total,0);
      const origemPie  = porGrupo.filter(g=>g.total>0).map(g=>({name:g.label,value:g.total,color:g.cor}));

      // ── CF vs WL (respeita período + origem; ignora filtro de tipo) ──
      const aggTipo=(rows,t)=>{ const o={total:0,mql:0,sql:0,ganho:0};
        rows.forEach(c=>{ o.total+=(c[t]||0); o.mql+=(c[t+'_mql']||0); o.sql+=(c[t+'_sql']||0); o.ganho+=(c[t+'_ganho']||0); }); return o; };
      const cfA=aggTipo(cm,'cf'), wlA=aggTipo(cm,'wl');

      // ── meses (evolução usa o período inteiro; MoM respeita os filtros) ──
      const mesesAll=[...new Set(cmAll.map(c=>c.mesKey))].sort();
      const mesesCm =[...new Set(cm.map(c=>c.mesKey))].sort();
      const mesLabel={}; (ld.porMes||[]).forEach(m=>mesLabel[m.mesKey]=m.mes);
      const evoLabels=mesesAll.map(mk=>mesLabel[mk]||mk);
      const evoData = g => mesesAll.map(mk=>agg(cmAll.filter(c=>c.mesKey===mk && c.tipoOrigem===g)).total);

      const totMes = mk => agg(cm.filter(c=>c.mesKey===mk)).total;
      const lastMK=mesesCm[mesesCm.length-1], prevMK=mesesCm[mesesCm.length-2];
      const momPct = lastMK&&prevMK&&totMes(prevMK)>0 ? (totMes(lastMK)-totMes(prevMK))/totMes(prevMK)*100 : null;

      // ── leads recentes (respeita data exata + tipo + origem) ──
      const parseData = s => { if(!s) return null; const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); };
      const deT=de?new Date(de.getFullYear(),de.getMonth(),de.getDate()).getTime():null;
      const ateT=ate?new Date(ate.getFullYear(),ate.getMonth(),ate.getDate(),23,59,59).getTime():null;
      const grpRec = l => l.pago?'pago':(String(l.canal||'').toLowerCase().includes('sem origem')?'sem_origem':'organico');
      const recentes=(ld.recentes||[]).filter(l=>{
        const d=parseData(l.data); if(d){ if(deT&&d.getTime()<deT) return false; if(ateT&&d.getTime()>ateT) return false; }
        if(tipo!=='all' && l.tipo!==tipo) return false;
        if(origem!=='all' && grpRec(l)!==origem) return false;
        return true;
      });

      // ── insights automáticos ──
      const ins=[];
      if(momPct!==null){
        if(momPct>=5) ins.push({ic:'📈',cor:'#059669',bg:'#ecfdf5',bd:'#bbf7d0',txt:`Volume de leads cresceu +${momPct.toFixed(0)}% no último mês do período — tendência positiva.`});
        else if(momPct<=-5) ins.push({ic:'📉',cor:'#dc2626',bg:'#fef2f2',bd:'#fecaca',txt:`Volume de leads caiu ${momPct.toFixed(0)}% no último mês do período — vale investigar a causa.`});
      }
      const elig=[...porGrupo].filter(g=>g.total>=20);
      const melhor=[...elig].sort((a,b)=>b.taxa-a.taxa)[0];
      const pior  =[...elig].sort((a,b)=>a.taxa-b.taxa)[0];
      if(melhor) ins.push({ic:'🏆',cor:'#059669',bg:'#ecfdf5',bd:'#bbf7d0',txt:`${melhor.label} é a origem que mais vira Ganho: ${pct(melhor.taxa)} dos leads fecham. Vale concentrar esforço aqui.`});
      if(melhor&&pior&&melhor.key!==pior.key&&melhor.taxa>pior.taxa+5) ins.push({ic:'⚖️',cor:'#4338ca',bg:'#eef2ff',bd:'#c7d2fe',txt:`${pior.label} converte bem menos (${pct(pior.taxa)}) do que ${melhor.label} (${pct(melhor.taxa)}). Revisar a qualidade dessa origem.`});
      const semG=porGrupo.find(g=>g.key==='sem_origem');
      if(semG&&totalGeral&&semG.total/totalGeral>0.35) ins.push({ic:'🔎',cor:'#d97706',bg:'#fffbeb',bd:'#fde68a',txt:`${pct(semG.total/totalGeral*100)} dos leads estão SEM origem rastreada — melhorar UTMs/etiquetas daria muito mais clareza de canal.`});
      if(total>=30&&taxaGanho<8) ins.push({ic:'⚠️',cor:'#d97706',bg:'#fffbeb',bd:'#fde68a',txt:`Taxa de Ganho geral de ${pct(taxaGanho)} no recorte atual — olhar os gargalos entre MQL → SQL → Ganho.`});
      if(cfA.total>0&&wlA.total>0){
        const cfTx=cfA.ganho/cfA.total*100, wlTx=wlA.ganho/wlA.total*100;
        if(Math.abs(cfTx-wlTx)>5) ins.push({ic:'💡',cor:'#4338ca',bg:'#eef2ff',bd:'#c7d2fe',txt:`${cfTx>wlTx?'Cliente Final':'White Label'} converte melhor em Ganho (${pct(Math.max(cfTx,wlTx))} vs ${pct(Math.min(cfTx,wlTx))}).`});
      }

      const tipoLabel = tipo==='cliente_final'?'Cliente Final':tipo==='white_label'?'White Label':'Todos os tipos';
      const origemLabel = origem==='all'?'todas as origens':(grupos.find(g=>g.key===origem)||{}).label;

      const PillOrigem = () => (
        <div style={{display:'inline-flex',background:'#f1f5f9',borderRadius:8,padding:3,gap:2,flexWrap:'wrap'}}>
          {[['all','Todas'],['pago','🟥 Pago'],['organico','🟩 Orgânico'],['sem_origem','🟦 Sem origem']].map(([v,l])=>(
            <button key={v} onClick={()=>setOrigem(v)} className={origem===v?'pill-a':'pill-i'}
              style={{padding:'4px 11px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:500,background:origem===v?'#fff':'none'}}>{l}</button>
          ))}
        </div>
      );

      if(!hasLeads) return (
        <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:'14px 16px'}}>
          <p style={{fontSize:13,fontWeight:600,color:'#92400e',margin:0}}>⏳ Conectando à planilha HelenaCRM…</p>
          <p style={{fontSize:12,color:'#a16207',margin:'4px 0 0'}}>Aguarde o carregamento dos dados reais de leads.</p>
        </div>
      );

      const etapas=[
        {nome:'Leads válidos',v:total,  cor:'#6366f1'},
        {nome:'MQL ou +',     v:mqlMais,cor:'#8b5cf6'},
        {nome:'SQL ou +',     v:sqlMais,cor:'#0ea5e9'},
        {nome:'🏆 Ganho',     v:ganho,  cor:'#10b981'},
      ];

      return (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {/* contexto + filtro de origem */}
          <div style={{display:'flex',flexWrap:'wrap',gap:10,alignItems:'center',justifyContent:'space-between',
            background:'#fff',border:'1px solid #e2e8f0',borderRadius:10,padding:'10px 14px'}}>
            <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.05em'}}>Origem:</span>
              <PillOrigem/>
            </div>
            <p style={{fontSize:11,color:'#94a3b8',margin:0}}>
              Mostrando <b style={{color:'#475569'}}>{tipoLabel}</b> · <b style={{color:'#475569'}}>{origemLabel}</b> · {fmtDate(de)} – {fmtDate(ate)}
            </p>
          </div>

          {/* KPIs principais */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(150px,1fr))',gap:12}}>
            <MetricCard title="Total de Leads" value={fmt(total)} sub={`${fmtDate(de)} – ${fmtDate(ate)}`} cor="indigo" icon={<IUsers/>} trend={momPct!==null?+momPct.toFixed(0):undefined}
              info="Leads válidos (etiqueta CF/WL no CRM), sem duplicados (contato único por mês), respeitando o período e os filtros."/>
            <MetricCard title="MQL ou superior" value={fmt(mqlMais)} sub={pct(total?mqlMais/total*100:0)+' dos leads'} cor="purple" icon={<IChart/>}
              info="Contatos que chegaram pelo menos a MQL (inclui SQL e Ganho). MQL = etiqueta 7'MQL."/>
            <MetricCard title="SQL ou superior" value={fmt(sqlMais)} sub={pct(total?sqlMais/total*100:0)+' dos leads'} cor="cyan" icon={<IChart/>}
              info="Contatos que chegaram pelo menos a SQL (inclui Ganho). SQL = etiqueta 8'SQL ou Funil Comercial (SQL)."/>
            <MetricCard title="🏆 Ganho" value={fmt(ganho)} sub={pct(taxaGanho)+' de fechamento'} cor="green" icon={<IUsers/>}
              info="Negócios ganhos (Etapa no CRM = 6. Ganho). Taxa de fechamento = Ganho ÷ Total de leads do recorte."/>
          </div>

          {/* Perdido — discreto */}
          {tipo==='all' && perdido>0 && (
            <div style={{fontSize:11.5,color:'#94a3b8',display:'flex',alignItems:'center',gap:7,marginTop:-6}}>
              <span style={{width:8,height:8,borderRadius:'50%',background:'#cbd5e1',display:'inline-block'}}/>
              Perdidos no período: <b style={{color:'#64748b'}}>{fmt(perdido)}</b>
              {(ganho+perdido)>0 && <span> — {pct(ganho/(ganho+perdido)*100)} de aproveitamento (Ganho ÷ casos decididos)</span>}
            </div>
          )}

          {/* Funil acumulado */}
          <Bloco titulo="Funil de conversão" sub={`${tipoLabel} · ${origemLabel}`}
            info="Funil acumulado: cada etapa inclui quem avançou além dela. Lê-se Leads → MQL+ → SQL+ → Ganho.">
            <div style={{display:'flex',flexDirection:'column',gap:9}}>
              {etapas.map((e,i)=>{
                const w = total? Math.max(3, e.v/total*100):0;
                const convPrev = i>0 && etapas[i-1].v>0 ? e.v/etapas[i-1].v*100 : null;
                return (
                  <div key={e.nome} style={{display:'flex',alignItems:'center',gap:12}}>
                    <div style={{width:104,fontSize:12,fontWeight:600,color:'#475569',textAlign:'right',flexShrink:0}}>{e.nome}</div>
                    <div style={{flex:1,background:'#f1f5f9',borderRadius:8,height:30,overflow:'hidden'}}>
                      <div style={{width:w+'%',height:'100%',background:e.cor,borderRadius:8,transition:'width .4s',
                        display:'flex',alignItems:'center',paddingLeft:11,minWidth:54}}>
                        <span style={{fontSize:12.5,fontWeight:800,color:'#fff'}}>{fmt(e.v)}</span>
                      </div>
                    </div>
                    <div style={{width:140,flexShrink:0,lineHeight:1.25}}>
                      <div style={{fontSize:11.5,color:'#475569',fontWeight:600}}>{pct(total?e.v/total*100:0)} <span style={{fontSize:9,color:'#94a3b8',fontWeight:400}}>do total</span></div>
                      {convPrev!==null && <div style={{fontSize:10,color:'#94a3b8'}}>↳ {pct(convPrev)} da etapa anterior</div>}
                    </div>
                  </div>
                );
              })}
            </div>
          </Bloco>

          {/* CF vs WL */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(280px,1fr))',gap:12}}>
            {[{lab:'Cliente Final',a:cfA,cor:'#6366f1',ic:<IUsers/>},{lab:'White Label',a:wlA,cor:'#f59e0b',ic:<IWL/>}].map(({lab,a,cor,ic})=>{
              const mm=a.mql+a.sql+a.ganho, sm=a.sql+a.ganho;
              return (
                <div key={lab} className="card" style={{padding:18}}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:12}}>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <span style={{background:cor+'22',color:cor,padding:7,borderRadius:8,display:'flex'}}>{ic}</span>
                      <span style={{fontSize:13,fontWeight:700,color:'#1e293b'}}>{lab}</span>
                    </div>
                    <span style={{fontSize:22,fontWeight:800,color:'#0f172a'}}>{fmt(a.total)}</span>
                  </div>
                  <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                    {[['MQL+',mm,'#7c3aed','#f5f3ff'],['SQL+',sm,'#0e7490','#ecfeff'],['Ganho',a.ganho,'#047857','#ecfdf5']].map(([st,n,tc,bg])=>(
                      <div key={st} style={{textAlign:'center',padding:'8px 4px',background:bg,borderRadius:8}}>
                        <p style={{fontSize:9,fontWeight:700,color:tc,textTransform:'uppercase',letterSpacing:'.05em',margin:'0 0 3px'}}>{st}</p>
                        <p style={{fontSize:18,fontWeight:800,color:'#0f172a',margin:0}}>{fmt(n)}</p>
                        <p style={{fontSize:10,color:'#94a3b8',margin:'2px 0 0'}}>{pct(a.total?n/a.total*100:0)}</p>
                      </div>
                    ))}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Origem: donut + tabela cruzada */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:12}}>
            <Bloco titulo="Leads por origem" sub="Pago · Orgânico · Sem origem"
              csvDados={porGrupo.map(g=>({origem:g.label,leads:g.total,mql_mais:g.mqlMais,sql_mais:g.sqlMais,ganho:g.ganho,taxa_ganho:g.taxa.toFixed(1)+'%'}))} csvNome="leads-por-origem.csv"
              info="Origem definida por Origem/Campanha/Anúncio. Sem origem = os 3 vazios. (Este gráfico mostra sempre os 3 grupos — ignora o filtro de origem acima.)">
              <DonutChart data={origemPie} h={220}/>
            </Bloco>
            <Bloco titulo="Funil por origem" sub="Quantos viram MQL, SQL e Ganho em cada origem"
              info="Funil acumulado dentro de cada origem. Taxa = Ganho ÷ Leads daquela origem.">
              <Tabela cols={[{label:'Origem'},{label:'Leads',right:true},{label:'MQL+',right:true},{label:'SQL+',right:true},{label:'Ganho',right:true},{label:'Taxa',right:true}]}
                rows={porGrupo} renderRow={(g)=>(
                  <>
                    <Td><span style={{display:'inline-flex',alignItems:'center',gap:6}}><span style={{width:9,height:9,borderRadius:'50%',background:g.cor,display:'inline-block'}}/>{g.label}</span></Td>
                    <Td right bold>{fmt(g.total)}</Td>
                    <Td right mono>{fmt(g.mqlMais)}</Td>
                    <Td right mono>{fmt(g.sqlMais)}</Td>
                    <Td right mono>{fmt(g.ganho)}</Td>
                    <Td right><span className={g.taxa>=10?'badge-green':g.taxa>=5?'badge-amber':'badge-gray'}>{pct(g.taxa)}</span></Td>
                  </>
                )}/>
            </Bloco>
          </div>

          {/* Evolução mensal */}
          {evoLabels.length>1 && (
            <Bloco titulo="Evolução de leads por mês" sub="Volume por origem ao longo do período"
              info="Total de leads por mês (Data de Criação do Card), empilhado por origem.">
              <BarChart2 stacked labels={evoLabels} datasets={[
                {label:'Pago / Ads',data:evoData('pago'),backgroundColor:'#ef4444'},
                {label:'Orgânico',data:evoData('organico'),backgroundColor:'#10b981'},
                {label:'Sem origem',data:evoData('sem_origem'),backgroundColor:'#6366f1'},
              ]} h={270}/>
            </Bloco>
          )}

          {/* Insights */}
          {ins.length>0 && (
            <Bloco titulo="💡 Insights automáticos" sub="Leitura dos dados no recorte atual">
              <div style={{display:'flex',flexDirection:'column',gap:8}}>
                {ins.map((x,i)=>(
                  <div key={i} style={{display:'flex',gap:10,alignItems:'flex-start',background:x.bg,border:'1px solid '+x.bd,borderRadius:9,padding:'10px 12px'}}>
                    <span style={{fontSize:15,lineHeight:1.2}}>{x.ic}</span>
                    <p style={{fontSize:12.5,color:x.cor,margin:0,fontWeight:500,lineHeight:1.5}}>{x.txt}</p>
                  </div>
                ))}
              </div>
            </Bloco>
          )}

          {/* Leads recentes */}
          {recentes.length>0 && (
            <Bloco titulo="Leads recentes" sub={`${fmt(recentes.length)} contatos no recorte (mostrando até 25)`}>
              <Tabela cols={[{label:'Nome'},{label:'Origem'},{label:'Tipo'},{label:'Etapa'},{label:'Data',right:true}]}
                rows={recentes.slice(0,25)} renderRow={(l)=>(
                  <>
                    <Td bold>{l.nome||'—'}</Td>
                    <Td>{l.canal}</Td>
                    <Td><span className={l.tipo==='white_label'?'badge-amber':'badge-indigo'}>{l.tipo==='white_label'?'White Label':'Cliente Final'}</span></Td>
                    <Td><span className={l.isGanho?'badge-green':(l.isSql||l.isMql)?'badge-indigo':'badge-gray'}>{l.isGanho?'GANHO':l.isSql?'SQL':l.isMql?'MQL':'LEAD'}{l.isPerdido?' · perdido':''}</span></Td>
                    <Td right>{l.data}</Td>
                  </>
                )}/>
            </Bloco>
          )}

        </div>
      );
    };

    /* ══════════════════════════════════════════════
       ABA 2 — SEO (enriquecida para growth)
    ══════════════════════════════════════════════ */

    const AbaSEO=({api,diasApi=90})=>{
      const [kwPage,setKwPage]=useState(0);
      const [brandPage,setBrandPage]=useState(0);
      const [origPage,setOrigPage]=useState(0);
      const [mapaPage,setMapaPage]=useState(0);
      const KW_PER_PAGE=10;
      const gscOk = !!(api?.gsc && !api.gsc.erro && (api.gsc.keywords?.length||api.gsc.historico?.length));
      const ga4Ok = !!(api?.ga4 && !api.ga4.erro && api.ga4.canais?.length);

      // GSC — métricas (usa totais reais da query sem dimensão; fallback para soma do histórico)
      const gscTot  = gscOk&&api.gsc.totais ? api.gsc.totais : null;
      const tlImpr  = gscTot ? gscTot.impressoes : (gscOk&&api.gsc.historico?.length ? api.gsc.historico.reduce((s,t)=>s+t.impressoes,0) : null);
      const tlCli   = gscTot ? gscTot.cliques    : (gscOk&&api.gsc.historico?.length ? api.gsc.historico.reduce((s,t)=>s+t.cliques,0)   : null);
      const ctrStr  = gscTot ? gscTot.ctr.toFixed(1)+'%'   : (tlImpr ? (tlCli/tlImpr*100).toFixed(1)+'%' : (gscOk?'—':'4,9%'));
      const posStr  = gscTot ? gscTot.posicao.toFixed(1)+'°' : (gscOk&&api.gsc.keywords?.length ? (api.gsc.keywords.reduce((s,k)=>s+k.posicao,0)/api.gsc.keywords.length).toFixed(1)+'°' : (gscOk?'—':'3,4°'));
      const imprStr = tlImpr ? (tlImpr>=1000?(tlImpr/1000).toFixed(1)+'K':String(tlImpr)) : (gscOk?'—':'87,4K');
      const cliStr  = tlCli  ? fmt(tlCli) : (gscOk?'—':'4.280');

      // GA4 — métricas (usa totais reais sem dimensão; fallback para soma dos canais)
      const ga4Tot  = ga4Ok&&api.ga4.totais ? api.ga4.totais : null;
      const totalSes= ga4Tot ? ga4Tot.sessoes : (ga4Ok ? api.ga4.canais.reduce((s,c)=>s+c.sessoes,0) : null);
      const orgSes  = ga4Ok ? api.ga4.canais.filter(c=>/organic/i.test(c.canal||'')).reduce((s,c)=>s+c.sessoes,0) : null;
      const novosN  = ga4Tot ? ga4Tot.novosUsuarios : (ga4Ok ? api.ga4.canais.reduce((s,c)=>s+c.novosUsuarios,0) : null);
      const bounceS = ga4Tot ? ga4Tot.bounce.toFixed(1)+'%' : (ga4Ok&&totalSes ? (api.ga4.canais.reduce((s,c)=>s+(c.bounce*(c.sessoes/totalSes)),0)).toFixed(1)+'%' : (ga4Ok?'—':'46,2%'));
      const novosS  = totalSes&&novosN ? (novosN/totalSes*100).toFixed(1)+'%' : (ga4Ok?'—':'68,4%');
      const sesStr  = orgSes!==null ? fmt(orgSes) : (ga4Ok?'—':'12.840');

      // Gráfico timeline
      const timeline = gscOk&&api.gsc.historico?.length
        ? api.gsc.historico.slice(-90).map(t=>({sem:t.data.slice(5),impressoes:t.impressoes,cliques:t.cliques}))
        : (gscOk?[]:SEO_SEMANAS);

      // Keywords
      const kwRows = gscOk&&api.gsc.keywords?.length
        ? api.gsc.keywords.map(k=>({kw:k.query,pos:k.posicao,vol:k.impressoes,cli:k.cliques,ctr:k.ctr,var:0}))
        : (gscOk?[]:TOP_KWS);
      const brandKwRows = gscOk&&api.gsc.keywords?.length
        ? api.gsc.keywords.filter(k=>k.query.toLowerCase().includes('helena')).map(k=>({kw:k.query,pos:k.posicao,vol:k.impressoes,cli:k.cliques,ctr:k.ctr,var:0}))
        : (gscOk?[]:BRAND_KWS);

      // Dispositivos
      const colDev={desktop:'#6366f1',mobile:'#10b981',tablet:'#f59e0b'};
      const devData = ga4Ok&&api.ga4.dispositivos?.length
        ? (()=>{const tot=api.ga4.dispositivos.reduce((s,d)=>s+d.sessoes,0);
            return api.ga4.dispositivos.map(d=>({
              name:d.tipo==='desktop'?'Desktop':d.tipo==='mobile'?'Mobile':'Tablet',
              value:Math.round(d.sessoes/tot*100),color:colDev[d.tipo]||'#94a3b8'}));})()
        : (ga4Ok?[]:DEVICES);

      // Canais — agrupados em 6 categorias
      const chData = ga4Ok&&api.ga4.canais?.length
        ? (()=>{
            const grupos={pago:0,organico:0,direto:0,referral:0,email:0,unassigned:0};
            api.ga4.canais.forEach(c=>{
              const k=c.canal||'';
              if(/paid social|paid search/i.test(k))         grupos.pago       +=c.sessoes;
              else if(/organic/i.test(k))                    grupos.organico   +=c.sessoes;
              else if(/direct/i.test(k))                     grupos.direto     +=c.sessoes;
              else if(/referral/i.test(k))                   grupos.referral   +=c.sessoes;
              else if(/email/i.test(k))                      grupos.email      +=c.sessoes;
              else                                           grupos.unassigned +=c.sessoes;
            });
            const tot=Object.values(grupos).reduce((s,v)=>s+v,0)||1;
            const defs=[
              {key:'pago',      name:'Pago',           color:'#ec4899'},
              {key:'organico',  name:'Orgânico',        color:'#10b981'},
              {key:'direto',    name:'Direto',          color:'#6366f1'},
              {key:'referral',  name:'Referral',        color:'#8b5cf6'},
              {key:'email',     name:'E-mail',          color:'#f97316'},
              {key:'unassigned',name:'Não atribuído',   color:'#94a3b8'},
            ];
            return defs.filter(d=>grupos[d.key]>0).map(d=>({
              name:d.name, value:Math.round(grupos[d.key]/tot*100), color:d.color, sessoes:grupos[d.key]
            })).sort((a,b)=>b.value-a.value);
          })()
        : (ga4Ok?[]:CANAIS_AQUISICAO);

      // Páginas
      const topPags = gscOk&&api.gsc.paginas?.length
        ? [...api.gsc.paginas].sort((a,b)=>b.cliques-a.cliques).slice(0,6)
            .map(p=>({url:p.url,ses:p.cliques,bounce:'—',tempo:'—',var:0}))
        : (gscOk?[]:TOP_PAGINAS);
      const botPags = gscOk&&api.gsc.paginas?.length
        ? [...api.gsc.paginas].sort((a,b)=>a.cliques-b.cliques).slice(0,5)
            .map(p=>({url:p.url,ses:p.cliques,bounce:'—',opp:'Otimizar CTR e meta description'}))
        : (gscOk?[]:BOTTOM_PAGINAS);
      const opps = gscOk&&api.gsc.paginas?.length
        ? api.gsc.paginas.filter(p=>p.impressoes>300&&p.ctr<3)
            .sort((a,b)=>b.impressoes-a.impressoes).slice(0,5)
            .map(p=>({url:p.url,impr:p.impressoes,ctr:p.ctr,pos:p.posicao,
              potencial:p.impressoes>1500?'alto':'médio',acao:'Melhorar title tag e meta description'}))
        : (gscOk?[]:OPORTUNIDADES);

      const origensAtivas = ga4Ok&&api.ga4.origens?.length ? api.ga4.origens : null;
      const totalOrigens = origensAtivas ? origensAtivas.reduce((s,o)=>s+o.sessoes,0) : 0;

      return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>

        {/* Fonte */}
        {(gscOk||ga4Ok) && (
          <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:'9px 14px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:14}}>✅</span>
            <p style={{fontSize:12,fontWeight:600,color:'#166534',margin:0}}>
              Dados reais · {[gscOk&&'GSC',ga4Ok&&'GA4'].filter(Boolean).join(' + ')} · Últimos {diasApi} dias · Atualizado: {api?.atualizado?.slice(0,10)||'—'}
            </p>
          </div>
        )}

        {/* GSC */}
        <div>
          <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Google Search Console</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:12}}>
            <MetricCard title="Impressões"    value={imprStr} sub={`Últimos ${diasApi} dias`} cor="indigo" icon={<IEye/>}
              info={`Total de vezes que o site apareceu nos resultados de busca do Google nos últimos ${diasApi} dias. Fonte: Google Search Console.`}/>
            <MetricCard title="Cliques"       value={cliStr}  sub={`Tráfego orgânico · ${diasApi}d`} cor="green"  icon={<IClick/>}
              info={`Total de cliques orgânicos recebidos pelo site nos últimos ${diasApi} dias. Fonte: Google Search Console.`}/>
            <MetricCard title="CTR Médio"     value={ctrStr}  sub="Taxa de cliques"   cor="amber"  icon={<IChart/>}
              info="Taxa de cliques: percentual de impressões que resultaram em um clique. Calculado sobre o total real do site. Fonte: Google Search Console."/>
            <MetricCard title="Posição Média" value={posStr}  sub="Ranking no Google" cor="purple" icon={<IOrg/>}
              info="Posição média do site nos resultados de busca do Google, ponderada por impressões. Quanto menor o número, melhor o ranking. Fonte: Google Search Console."/>
          </div>
        </div>

        {/* GA4 */}
        <div>
          <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Google Analytics 4</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:12}}>
            <MetricCard title="Sessões Orgânicas" value={sesStr}  sub={`Últimos ${diasApi} dias`} cor="cyan"   icon={<IOrg/>}
              info={`Soma de sessões vindas de canais orgânicos (Organic Search + Organic Social + Organic Video) nos últimos ${diasApi} dias. Fonte: Google Analytics 4.`}/>
            <MetricCard title="Bounce Rate"       value={bounceS} sub="Taxa de rejeição"    cor="amber"  icon={<IClick/>}
              info="Percentual de sessões sem nenhuma interação (clique, scroll, evento). Calculado sobre o total real do site. Meta: abaixo de 55%. Fonte: Google Analytics 4."/>
            <MetricCard title="Novos Usuários"    value={novosS}  sub="Do total de sessões" cor="indigo" icon={<IUsers/>}
              info={`Proporção de sessões de usuários que visitaram o site pela primeira vez nos últimos ${diasApi} dias em relação ao total de sessões. Fonte: Google Analytics 4.`}/>
            <MetricCard title="Total Sessões"     value={totalSes?fmt(totalSes):'—'} sub="Todos os canais" cor="green" icon={<IChart/>}
              info={`Total real de sessões em todos os canais nos últimos ${diasApi} dias, conforme relatório agregado do GA4 (sem dimensão). Fonte: Google Analytics 4.`}/>
          </div>
        </div>

        {/* Dispositivos + Canais */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:12}}>
          <Bloco titulo="Dispositivos" sub="Distribuição das sessões por dispositivo">
            <DonutChart data={devData} h={200}/>
          </Bloco>
          <Bloco titulo="Canais de Aquisição" sub="De onde vêm os visitantes — GA4">
            <DonutChart data={chData} h={200}/>
          </Bloco>
        </div>

        {/* Origem de Acessos */}
        {(origensAtivas||ga4Ok) && (()=>{
          const oriList=origensAtivas||[];
          const totalPagsOrig=Math.ceil(oriList.length/KW_PER_PAGE);
          const btnStyleO=(disabled)=>({padding:'5px 14px',borderRadius:7,border:'1px solid #e2e8f0',background:disabled?'#f8fafc':'#fff',color:disabled?'#cbd5e1':'#374151',fontWeight:600,fontSize:12,cursor:disabled?'default':'pointer'});
          const winO=[];const deltaO=3;
          for(let i=0;i<totalPagsOrig;i++){if(i===0||i===totalPagsOrig-1||Math.abs(i-origPage)<=deltaO)winO.push(i);}
          const pagesO=[];let prevO=-1;
          winO.forEach(i=>{if(prevO>=0&&i-prevO>1)pagesO.push('...');pagesO.push(i);prevO=i;});
          return(
            <Bloco titulo="Origem de Acessos" sub={`Grupo de canais · Origem / Mídia · Últimos ${diasApi} dias — GA4 · ${oriList.length} origens`} csvDados={oriList} csvNome="origens-acessos.csv">
              <div style={{marginBottom:14}}>
                <BarChart2
                  labels={oriList.slice(0,10).map(o=>o.fonte||o.origem)}
                  datasets={[{label:'Sessões',data:oriList.slice(0,10).map(o=>o.sessoes),backgroundColor:'#6366f1'}]}
                  h={220}/>
              </div>
              <Tabela
                cols={[{label:'#'},{label:'Grupo de Canais'},{label:'Origem / Mídia'},{label:'Sessões',right:true},{label:'Usuários',right:true},{label:'Engajamento',right:true}]}
                rows={oriList.slice(origPage*KW_PER_PAGE,(origPage+1)*KW_PER_PAGE)}
                renderRow={(o,i)=>{
                  const pctTotal=totalOrigens>0?+(o.sessoes/totalOrigens*100).toFixed(1):0;
                  const canalColor={'Paid Social':'#ec4899','Organic Search':'#10b981','Direct':'#6366f1','Paid Search':'#f59e0b','Organic Social':'#06b6d4','Referral':'#8b5cf6','Email':'#f97316','Unassigned':'#94a3b8'};
                  const cor=canalColor[o.canal]||'#94a3b8';
                  const [src,med]=(o.origem||o.canal||'').split(' / ');
                  return <>
                    <Td><span style={{fontSize:11,fontWeight:700,color:'#cbd5e1'}}>{origPage*KW_PER_PAGE+i+1}</span></Td>
                    <Td>
                      <span style={{fontSize:11,fontWeight:700,color:cor,background:cor+'18',padding:'2px 8px',borderRadius:10,whiteSpace:'nowrap'}}>
                        {o.canal||src}
                      </span>
                    </Td>
                    <Td>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontWeight:600,color:'#374151',fontSize:12}}>{src}</span>
                        {med&&<span style={{fontSize:11,background:'#f1f5f9',color:'#64748b',padding:'1px 6px',borderRadius:10}}>{med}</span>}
                      </div>
                      <div style={{fontSize:10,color:'#94a3b8',marginTop:1}}>{pctTotal}% do total</div>
                    </Td>
                    <Td right bold>{fmt(o.sessoes)}</Td>
                    <Td right><span style={{color:'#374151'}}>{fmt(o.usuarios??o.novos)}</span></Td>
                    <Td right>
                      <span className={(o.engajamento??100-o.bounce)<35?'badge-red':(o.engajamento??100-o.bounce)<55?'badge-amber':'badge-green'}>
                        {o.engajamento!=null?o.engajamento+'%':o.bounce!=null?(100-o.bounce).toFixed(1)+'%':'—'}
                      </span>
                    </Td>
                  </>;
                }}
              />
              {oriList.length>KW_PER_PAGE&&(
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,paddingTop:12,borderTop:'1px solid #f1f5f9'}}>
                  <button onClick={()=>setOrigPage(p=>Math.max(0,p-1))} disabled={origPage===0} style={btnStyleO(origPage===0)}>← Anterior</button>
                  <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                    {pagesO.map((p,idx)=>p==='...'
                      ?<span key={'e'+idx} style={{color:'#94a3b8',fontSize:12,padding:'0 2px'}}>…</span>
                      :<button key={p} onClick={()=>setOrigPage(p)}
                          style={{width:28,height:28,borderRadius:6,border:'1px solid',borderColor:origPage===p?'#6366f1':'#e2e8f0',background:origPage===p?'#6366f1':'#fff',color:origPage===p?'#fff':'#64748b',fontWeight:600,fontSize:12,cursor:'pointer'}}>
                          {p+1}
                        </button>
                    )}
                  </div>
                  <button onClick={()=>setOrigPage(p=>Math.min(totalPagsOrig-1,p+1))} disabled={origPage>=totalPagsOrig-1} style={btnStyleO(origPage>=totalPagsOrig-1)}>Próxima →</button>
                </div>
              )}
            </Bloco>
          );
        })()}

        {/* Timeline */}
        <Bloco titulo="Cliques e Impressões ao Longo do Tempo" sub="Evolução — Search Console" csvDados={timeline} csvNome="seo-timeline.csv">
          <AreaChart2
            labels={timeline.map(d=>d.sem)}
            datasets={[
              {label:'Impressões',data:timeline.map(d=>d.impressoes),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.08)',yAxisID:'y1'},
              {label:'Cliques',   data:timeline.map(d=>d.cliques),   borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)', yAxisID:'y2'},
            ]} h={250}/>
        </Bloco>

        {/* Top Keywords */}
        <Bloco titulo="Top Palavras-chave" sub={gscOk?`Dados reais — GSC · ${kwRows.length} palavras`:'Por posição média — dados de exemplo'} csvDados={kwRows} csvNome="keywords.csv">
          <Tabela
            cols={[{label:'#'},{label:'Palavra-chave'},{label:'Posição',right:true},{label:'Cliques',right:true},{label:'Impressões',right:true}]}
            rows={kwRows.slice(kwPage*KW_PER_PAGE,(kwPage+1)*KW_PER_PAGE)}
            renderRow={(kw,i)=><>
              <Td><span style={{fontSize:11,fontWeight:700,color:'#cbd5e1'}}>{kwPage*KW_PER_PAGE+i+1}</span></Td>
              <Td>{kw.kw}</Td>
              <Td right><span className={kw.pos<=2?'badge-green':kw.pos<=4?'badge-amber':'badge-gray'}>{kw.pos.toFixed(1)}°</span></Td>
              <Td right bold>{fmt(kw.cli)}</Td>
              <Td right><span style={{color:'#64748b'}}>{fmt(kw.vol||0)}</span></Td>
            </>}
          />
          {kwRows.length>KW_PER_PAGE&&(()=>{
            const totalPags=Math.ceil(kwRows.length/KW_PER_PAGE);
            const btnStyle=(disabled)=>({padding:'5px 14px',borderRadius:7,border:'1px solid #e2e8f0',background:disabled?'#f8fafc':'#fff',color:disabled?'#cbd5e1':'#374151',fontWeight:600,fontSize:12,cursor:disabled?'default':'pointer'});
            // janela de páginas: até 7 botões ao redor da atual
            const win=[];
            const delta=3;
            for(let i=0;i<totalPags;i++){
              if(i===0||i===totalPags-1||Math.abs(i-kwPage)<=delta) win.push(i);
            }
            const pages=[];
            let prev=-1;
            win.forEach(i=>{
              if(prev>=0&&i-prev>1) pages.push('...');
              pages.push(i);
              prev=i;
            });

    };

    const AbaEstrategia=({api,diasApi=30,de,ate})=>{
      const [openAcao,setOpenAcao]=useState(null);
      const [planoFiltro,setPlanoFiltro]=useState('todos'); // todos | a_fazer | em_curso | concluido
      const toMK=d=>d?String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0'):'';
      const startKey=toMK(de);
      const endKey=toMK(ate);

      // === FONTES DE DADOS ===
      const gscOk=!!(api?.gsc?.keywords?.length||api?.gsc?.historico?.length);
      const ga4Ok=!!(api?.ga4?.canais?.length);
      const smOk=!!(api?.semrush?.dominio?.keywords);
      const dataOk=gscOk||ga4Ok||smOk;

      // GSC — usa totais reais (query sem dimensão) para máxima precisão
      const gscTotais=api?.gsc?.totais||null;
      const _gscHist=api?.gsc?.historico||[];
      const gscImp=gscTotais ? gscTotais.impressoes : (_gscHist.length ? _gscHist.reduce((s,t)=>s+t.impressoes,0) : 0);
      const gscCli=gscTotais ? gscTotais.cliques    : (_gscHist.length ? _gscHist.reduce((s,t)=>s+t.cliques,0)   : 0);
      const gscCtr=gscTotais ? gscTotais.ctr        : (gscImp>0?(gscCli/gscImp*100):0);
      const gscPos=gscTotais ? gscTotais.posicao    : 0;
      const gscKws=api?.gsc?.keywords||[];

      // GA4 — usa totais reais (query sem dimensão) para máxima precisão
      const ga4Totais=api?.ga4?.totais||null;
      const ga4Canais=api?.ga4?.canais||[];
      const ga4Total=ga4Totais ? ga4Totais.sessoes : (ga4Canais.length ? ga4Canais.reduce((s,c)=>s+c.sessoes,0) : 0);
      const ga4Bounce=ga4Totais ? ga4Totais.bounce : (ga4Canais.length&&ga4Total>0 ? ga4Canais.reduce((s,c)=>s+(c.bounce*(c.sessoes/ga4Total)),0) : 0);
      const ga4Org=ga4Canais.filter(c=>/organic/i.test(c.canal||'')).reduce((s,c)=>s+c.sessoes,0);
      const orgRatio=ga4Total>0?(ga4Org/ga4Total*100):0;

      // SEMrush — deduplica por melhor posição
      const smRaw=api?.semrush?.keywords||[];
      const kwMap={}; smRaw.forEach(k=>{if(!kwMap[k.kw]||k.posicao<kwMap[k.kw].posicao)kwMap[k.kw]=k;});
      const smKws=Object.values(kwMap);
      const smDef=smKws.filter(k=>k.posicao<=3);
      const smAtacar=smKws.filter(k=>k.posicao>=4&&k.posicao<=20).sort((a,b)=>b.volume-a.volume);
      const smCapt=smKws.filter(k=>k.posicao>20).sort((a,b)=>b.volume-a.volume);
      const smTotal=api?.semrush?.dominio?.keywords||0;
      const smTraf=api?.semrush?.dominio?.traffic||0;
      const smConc=api?.semrush?.concorrentes||[];
      const smDiretos=smConc.filter(c=>c.tipo==='direto').sort((a,b)=>b.traffic-a.traffic);
      const smConteudo=smConc.filter(c=>c.tipo==='conteudo').sort((a,b)=>b.traffic-a.traffic);
      const topDir=smDiretos[0];

      // === SCORES DINÂMICOS ===
      const sCtr=gscCtr>5?35:gscCtr>3?28:gscCtr>2?20:gscCtr>1?12:5;
      const sPos=gscPos>0?(gscPos<5?28:gscPos<10?22:gscPos<15?15:gscPos<20?8:3):0;
      const sDef=smDef.length>=5?22:smDef.length>=3?16:smDef.length>=1?10:3;
      const sAtak=Math.min(15,smAtacar.length*2);
      const seoScore=gscOk?Math.min(100,Math.round(sCtr+sPos+sDef+sAtak)):0;

      const tBnc=ga4Bounce<40?35:ga4Bounce<55?26:ga4Bounce<65?17:ga4Bounce<75?10:4;
      const tSes=ga4Total>100000?30:ga4Total>50000?24:ga4Total>20000?17:ga4Total>5000?11:5;
      const tOrg=orgRatio>50?25:orgRatio>35?19:orgRatio>20?13:orgRatio>10?8:3;
      const trafegoScore=ga4Ok?Math.min(100,Math.round(tBnc+tSes+tOrg)):0;

      // Autoridade NÃO usa smDef para evitar dupla contagem com pilar SEO (sDef).
      // Usa volume de tráfego SEMrush + diversidade de keywords + keywords em ataque (oportunidade).
      const aKw=smTotal>10000?40:smTotal>5000?32:smTotal>2000?22:smTotal>1000?14:6;
      const aTraf=smTraf>20000?30:smTraf>10000?24:smTraf>3000?16:smTraf>500?10:4;
      const aAtk=smAtacar.length>=15?30:smAtacar.length>=8?22:smAtacar.length>=4?15:smAtacar.length>=1?9:3;
      const autoridadeScore=smOk?Math.min(100,Math.round(aKw+aTraf+aAtk)):0;

      const activePilares=[gscOk,ga4Ok,smOk].filter(Boolean).length||1;
      const overallScore=dataOk?Math.round((seoScore+trafegoScore+autoridadeScore)/activePilares):0;
      const scoreColor=overallScore>=80?'#10b981':overallScore>=65?'#6366f1':overallScore>=50?'#f59e0b':'#ef4444';
      const scoreLabel=overallScore>=80?'Ótimo':overallScore>=65?'Bom':overallScore>=50?'Atenção':'Crítico';

      // === LEADS DATA ===
      const leadsRaw=api?.leads||{};
      const lMes=(leadsRaw.porMes||[]).filter(m=>(!startKey||m.mesKey>=startKey)&&(!endKey||m.mesKey<=endKey));
      const lCanalMes=(leadsRaw.porCanalMes||[]).filter(c=>(!startKey||c.mesKey>=startKey)&&(!endKey||c.mesKey<=endKey));
      const lTotal=lMes.reduce((s,m)=>s+(m.total||0),0);
      const lCf=lMes.reduce((s,m)=>s+(m.cf||0),0);
      const lWl=lMes.reduce((s,m)=>s+(m.wl||0),0);
      const lMql=lMes.reduce((s,m)=>s+(m.mql||0),0);
      const lSql=lMes.reduce((s,m)=>s+(m.sql||0),0);
      const lPago=lMes.reduce((s,m)=>s+(m.pago||0),0);
      const lOrg=lMes.reduce((s,m)=>s+(m.organico||0),0);
      const leadsOk=lTotal>0;
      const mqlRate=lTotal>0?((lMql+lSql)/lTotal*100):0;
      const cfRate=lTotal>0?(lCf/lTotal*100):0;
      const wlRate=lTotal>0?(lWl/lTotal*100):0;
      const pagoRate=lTotal>0?(lPago/lTotal*100):0;
      const orgLeadRate=lTotal>0?(lOrg/lTotal*100):0;
      // Traffic → Lead conversion: SÓ confiável quando período é mensal ou maior (lMes é granular por mês).
      // Para 7d, ga4Total cobre 7 dias mas lTotal cobre mês inteiro — ratio inflado. Marcamos como inválido.
      const trafficLeadValido=diasApi>=28;
      const trafficLeadRate=trafficLeadValido&&ga4Total>0&&lTotal>0?(lTotal/ga4Total*100):0;
      // Top converting channel
      const canalConvMap={};
      lCanalMes.forEach(c=>{
        if(!canalConvMap[c.canal])canalConvMap[c.canal]={canal:c.canal,count:0,mql:0,sql:0,cf:0,wl:0,tipoOrigem:c.tipoOrigem};
        const e=canalConvMap[c.canal];
        e.count+=c.count;e.mql+=(c.mql||0);e.sql+=(c.sql||0);e.cf+=(c.cf||0);e.wl+=(c.wl||0);
      });
      const canalList=Object.values(canalConvMap).filter(c=>c.count>=3);
      const topConvCanal=[...canalList].sort((a,b)=>((b.mql+b.sql)/b.count)-((a.mql+a.sql)/a.count))[0];
      const topVolCanal=[...canalList].sort((a,b)=>b.count-a.count)[0];
      const pagoMqlRate=canalList.filter(c=>c.tipoOrigem==='pago').reduce((s,c)=>({mql:s.mql+(c.mql||0),sql:s.sql+(c.sql||0),count:s.count+c.count,cf:s.cf+(c.cf||0),wl:s.wl+(c.wl||0)}),{mql:0,sql:0,count:0,cf:0,wl:0});
      const orgMqlRate=canalList.filter(c=>c.tipoOrigem==='organico').reduce((s,c)=>({mql:s.mql+(c.mql||0),sql:s.sql+(c.sql||0),count:s.count+c.count,cf:s.cf+(c.cf||0),wl:s.wl+(c.wl||0)}),{mql:0,sql:0,count:0,cf:0,wl:0});
      const pagoConvPct=pagoMqlRate.count>0?((pagoMqlRate.mql+pagoMqlRate.sql)/pagoMqlRate.count*100):0;
      const orgConvPct=orgMqlRate.count>0?((orgMqlRate.mql+orgMqlRate.sql)/orgMqlRate.count*100):0;
      // Mix CF×WL por origem — comparar conversão pago/orgânico pode estar enviesado se o mix de tipos for diferente
      const pagoMixWl=pagoMqlRate.count>0?(pagoMqlRate.wl/pagoMqlRate.count*100):0;
      const orgMixWl=orgMqlRate.count>0?(orgMqlRate.wl/orgMqlRate.count*100):0;
      const mixDiverge=Math.abs(pagoMixWl-orgMixWl)>15; // >15pp = comparação enviesada

      // Curva CTR esperada por posição no Google (média do mercado — fonte: Advanced Web Ranking 2024)
      const ctrPorPos=(pos)=>{
        if(pos<=1) return 0.305;
        if(pos<=2) return 0.158;
        if(pos<=3) return 0.094;
        if(pos<=4) return 0.062;
        if(pos<=5) return 0.043;
        if(pos<=6) return 0.031;
        if(pos<=7) return 0.024;
        if(pos<=8) return 0.019;
        if(pos<=9) return 0.016;
        if(pos<=10)return 0.013;
        if(pos<=15)return 0.007;
        if(pos<=20)return 0.004;
        return 0.002;
      };
      // Ganho estimado ao subir uma keyword de posAtual → posAlvo
      const ganhoCliques=(vol,posAtual,posAlvo)=>{
        const delta=ctrPorPos(posAlvo)-ctrPorPos(posAtual);
        return Math.max(0,Math.round(vol*delta));
      };

      const pilares=[
        {area:'SEO & Conteúdo',score:seoScore,ic:'🔍',
         desc:`CTR ${gscCtr.toFixed(1)}% · Pos. média ${gscPos.toFixed(1)} · ${smDef.length} keywords top 3 · ${smAtacar.length} para atacar`},
        {area:'Tráfego & Engajamento',score:trafegoScore,ic:'📊',
         desc:`${ga4Total.toLocaleString('pt-BR')} sessões · ${ga4Bounce.toFixed(1)}% bounce · ${orgRatio.toFixed(0)}% orgânico`},
        {area:'Autoridade & Competição',score:autoridadeScore,ic:'🏆',
         desc:`${smTotal.toLocaleString('pt-BR')} keywords orgânicas · ${smDef.length} Defender · ${smAtacar.length} Atacar · ${smCapt.length} Capturar`},
      ];

      // === OPORTUNIDADES ===
      const topAtacar410=smAtacar.filter(k=>k.posicao<=10).slice(0,3);
      const gscLowCtr=gscKws.filter(k=>k.impressoes>500&&k.ctr<2&&k.posicao<20)
        .sort((a,b)=>b.impressoes-a.impressoes).slice(0,4);
      const topCapt=smCapt.filter(k=>k.volume>500).slice(0,3);

      // === FORECAST DE TRÁFEGO (curva CTR real) ===
      // Ganho potencial total se subir TODAS as keywords da zona "Atacar" (pos 4-20) para top 3
      const forecastAtacarTop3=smAtacar.reduce((s,k)=>s+ganhoCliques(k.volume,k.posicao,3),0);
      // Ganho potencial se elevar páginas com CTR baixo do GSC para CTR de 3.5%
      const forecastCtr=gscLowCtr.reduce((s,k)=>s+Math.round(k.impressoes*Math.max(0,(0.035-k.ctr/100))),0);
      const forecastTotal=forecastAtacarTop3+forecastCtr;

      // Páginas do SEMrush para ações específicas
      const smPaginas=api?.semrush?.paginas||[];
      const paginasAtacar=smPaginas.filter(p=>p.atacar?.length>0).sort((a,b)=>b.atacar.length-a.atacar.length);
      const paginasCapturar=smPaginas.filter(p=>p.atacar?.length===0&&p.capturar?.length>0).sort((a,b)=>b.totalVol-a.totalVol);

      // === DIAGNÓSTICO CRUZADO: GSC × SEMrush por página ===
      const gscPaginas=api?.gsc?.paginas||[];
      // Normaliza URL: tira protocolo, hostname, query, hash e barra final → slug puro
      const _normSlug=(u)=>{
        if(!u) return '';
        let s=String(u).replace(/^https?:\/\/[^/]+/,'').replace(/[?#].*$/,'').replace(/\/+$/,'');
        return s||'/';
      };
      // === Deduplica por slug — mesma página com várias URLs do SEMrush vira uma só ===
      const _pagMap={};
      smPaginas.forEach(sp=>{
        const slug=_normSlug(sp.url);
        if(!_pagMap[slug]) _pagMap[slug]={url:sp.url,slug,atacar:[],capturar:[],defender:[],totalKws:0,totalVol:0};
        const acc=_pagMap[slug];
        (sp.atacar||[]).forEach(k=>acc.atacar.push(k));
        (sp.capturar||[]).forEach(k=>acc.capturar.push(k));
        (sp.defender||[]).forEach(k=>acc.defender.push(k));
        acc.totalKws+=(sp.totalKws||0);
        acc.totalVol+=(sp.totalVol||0);
      });
      // Dedup interno de keywords (mesma kw em zonas duplicadas — mantém melhor posição)
      Object.values(_pagMap).forEach(p=>{
        const dedup=(arr)=>{const m={};arr.forEach(k=>{if(!m[k.kw]||(k.pos||999)<(m[k.kw].pos||999))m[k.kw]=k;});return Object.values(m);};
        p.atacar=dedup(p.atacar);
        p.capturar=dedup(p.capturar);
        p.defender=dedup(p.defender);
      });
      const smPaginasUnicas=Object.values(_pagMap);

      const paginasDiagnostico=smPaginasUnicas.map(sp=>{
        const slug=sp.slug;
        const gscMatch=gscPaginas.find(g=>_normSlug(g.url)===slug);
        // Top keyword (maior volume) entre as oportunidades reais (Atacar > Capturar)
        const topKwAtacar=sp.atacar.length?[...sp.atacar].sort((a,b)=>b.vol-a.vol)[0]:null;
        const topKwCapt=sp.capturar.length?[...sp.capturar].sort((a,b)=>b.vol-a.vol)[0]:null;
        const topKw=topKwAtacar||topKwCapt;
        // Ganho potencial estimado (curva CTR real) ao subir topKw para top 3
        const ganhoTop3=topKwAtacar?ganhoCliques(topKwAtacar.vol,topKwAtacar.pos,3):0;

        const sinais=[];
        const acoesPagina=[];
        if(sp.atacar.length>0){sinais.push(`${sp.atacar.length} keyword(s) prontas pra subir (pos 4-20)`);acoesPagina.push('otimizar_on_page');}
        if(sp.capturar.length>0){sinais.push(`${sp.capturar.length} keyword(s) precisam de mais conteúdo (pos 21+)`);acoesPagina.push('enriquecer_conteudo');}
        if(sp.defender.length>0) sinais.push(`${sp.defender.length} keyword(s) já no top 3 — manter`);
        if(gscMatch){
          if(gscMatch.ctr<2&&gscMatch.impressoes>300){sinais.push(`CTR baixo: ${gscMatch.ctr.toFixed(1)}% (esperado: >3%)`);acoesPagina.push('melhorar_snippet');}
          if(gscMatch.posicao>=8&&gscMatch.posicao<=12&&gscMatch.impressoes>500){sinais.push(`Pos #${Math.round(gscMatch.posicao)} — beirando o top 10`);acoesPagina.push('empurrar_top10');}
        }

        // Recomendação clara e específica
        let recAcao='';
        let recDetalhe='';
        if(acoesPagina.includes('otimizar_on_page')&&topKwAtacar){
          recAcao=`Otimizar para "${topKwAtacar.kw}"`;
          recDetalhe=`Pos #${topKwAtacar.pos} · ${topKwAtacar.vol.toLocaleString('pt-BR')} buscas/mês · ganho estimado: +${ganhoTop3.toLocaleString('pt-BR')} cliques/mês no top 3`;
        } else if(acoesPagina.includes('melhorar_snippet')&&gscMatch){
          recAcao=`Reescrever title + meta description`;
          recDetalhe=`CTR ${gscMatch.ctr.toFixed(1)}% com ${gscMatch.impressoes.toLocaleString('pt-BR')} impressões — ganho ao elevar p/ 3,5%: +${Math.round(gscMatch.impressoes*(0.035-gscMatch.ctr/100)).toLocaleString('pt-BR')} cliques/mês`;
        } else if(acoesPagina.includes('enriquecer_conteudo')&&topKwCapt){
          recAcao=`Criar/expandir conteúdo para "${topKwCapt.kw}"`;
          recDetalhe=`Pos #${topKwCapt.pos} · ${topKwCapt.vol.toLocaleString('pt-BR')} buscas/mês — ainda muito longe do top 10, precisa de mais conteúdo`;
        } else if(sp.defender.length>0){
          recAcao=`Manter posição — monitorar mensalmente`;
          recDetalhe=`${sp.defender.length} keyword(s) no top 3. Atualizar conteúdo a cada 3 meses para defender ranking`;
        }

        const prioridade=
          (acoesPagina.includes('otimizar_on_page')&&acoesPagina.includes('melhorar_snippet'))?'alta':
          acoesPagina.includes('otimizar_on_page')?'alta':
          acoesPagina.includes('melhorar_snippet')?'alta':
          acoesPagina.includes('empurrar_top10')?'alta':'média';

        return {...sp,slug,gscMatch,sinais,acoesPagina,prioridade,topKw,topKwAtacar,topKwCapt,ganhoTop3,recAcao,recDetalhe,
          scoreOportunidade:(sp.atacar.length)*3+(sp.capturar.length)*1+(gscMatch?.impressoes||0)/1000+ganhoTop3*0.5};
      }).filter(p=>p.sinais.length>0).sort((a,b)=>b.scoreOportunidade-a.scoreOportunidade);

      // === PLANO DE AÇÃO COM PASSO A PASSO ===
      const acoes=[];

      paginasAtacar.slice(0,2).forEach((p,i)=>{
        const slug=p.url.replace(/^https?:\/\/[^/]+/,'').replace(/\/$/,'')||'/';
        const topKw=[...p.atacar].sort((a,b)=>b.vol-a.vol)[0];
        const outrasKws=p.atacar.slice(1,3).map(k=>`"${k.kw}"`).join(', ');
        acoes.push({
          prioridade:'alta',zona:'SEO · Página',prazo:i===0?'1-2 semanas':'2-3 semanas',icone:'⚔️',
          titulo:`Otimizar "${slug}" — subir ${p.atacar.length} keyword(s) para o top 3`,
          contexto:`"${topKw.kw}" está na posição #${topKw.pos} com ${topKw.vol.toLocaleString('pt-BR')} buscas/mês.${outrasKws?' Outras keywords na mesma página: '+outrasKws+'.':''} Otimizando esta página corretamente é possível chegar ao top 3 e capturar ~${ganhoCliques(topKw.vol,topKw.pos,3).toLocaleString('pt-BR')} cliques/mês a mais só para essa keyword.`,
          passos:[
            `Acesse a página "${slug}" no seu CMS`,
            `Reescreva o H1 incluindo a keyword exata: "${topKw.kw}" — deve aparecer no início do título`,
            `Atualize a meta description (máx 155 chars): mencione "${topKw.kw}" e termine com CTA. Ex: "Como usar ${topKw.kw} no seu negócio — guia completo com exemplos práticos e como começar hoje."`,
            `Adicione seção FAQ ao final do artigo com 4-6 perguntas (use as sugestões do Google ao pesquisar a keyword)`,
            `Adicione schema markup JSON-LD do tipo FAQ para aparecer nos rich snippets do Google`,
            `Crie 2-3 links internos de outras páginas do site apontando para esta URL`,
            `Submeta a URL para reindexação: Search Console → URL Inspection → Solicitar indexação`,
          ],
          potencial:`+${p.atacar.reduce((s,k)=>s+ganhoCliques(k.vol,k.pos,3),0).toLocaleString('pt-BR')} cliques/mês estimados ao subir para top 3`,
        });
      });

      if(gscLowCtr.length>0){
        const k=gscLowCtr[0];
        acoes.push({
          prioridade:'alta',zona:'CTR',prazo:'Esta semana',icone:'✍️',
          titulo:`Melhorar snippet de "${k.query}" — apenas ${k.ctr.toFixed(1)}% CTR com ${k.impressoes.toLocaleString('pt-BR')} impressões/mês`,
          contexto:`Esta keyword aparece ${k.impressoes.toLocaleString('pt-BR')} vezes/mês no Google (pos #${Math.round(k.posicao)}), mas só ${k.ctr.toFixed(1)}% dos usuários clicam. A média saudável é >3%. Isso significa que o título e a descrição não estão atraindo — e é a oportunidade de maior ganho rápido sem criar nenhum conteúdo novo.`,
          passos:[
            `Abra o Google Search Console → aba "Consultas" → filtre por "${k.query}" → identifique qual URL está aparecendo`,
            `Acesse essa página no CMS`,
            `Reescreva o Title Tag (máx 60 chars): inclua a keyword no início + número ou promessa clara. Ex: "${k.query.charAt(0).toUpperCase()+k.query.slice(1)}: Guia Completo [2026]" ou "Como usar ${k.query} — passo a passo"`,
            `Reescreva a Meta Description (máx 155 chars): comece com benefício + inclua a keyword + termine com CTA. Ex: "Integre ${k.query} ao seu negócio em minutos. Veja como configurar, quais os custos e como evitar erros comuns."`,
            `Não altere a URL (mudança de URL derruba o ranqueamento)`,
            `Monitore o CTR no Search Console após 7-14 dias para confirmar melhora`,
          ],
          potencial:`+${Math.round(k.impressoes*Math.max(0,(0.035-k.ctr/100))).toLocaleString('pt-BR')} cliques/mês ao elevar CTR para ~3,5% (sem criar conteúdo novo)`,
        });
      }

      if(gscLowCtr.length>1){
        const extras=gscLowCtr.slice(1);
        acoes.push({
          prioridade:'alta',zona:'CTR',prazo:'Semana 1-2',icone:'✍️',
          titulo:`Otimizar snippets de mais ${extras.length} página(s) com CTR abaixo do esperado`,
          contexto:`${extras.map(k=>`"${k.query}" (${k.impressoes.toLocaleString('pt-BR')} impressões, ${k.ctr.toFixed(1)}% CTR)`).join(' · ')}. Todas estão na primeira ou segunda página do Google mas perdem cliques por títulos e descrições fracos.`,
          passos:extras.slice(0,3).map((k,j)=>(
            `Página ${j+1}: busque "${k.query}" no Search Console → identifique a URL → atualize title (60 chars com keyword no início) e meta description (155 chars com CTA)`
          )).concat([
            `Para cada página: teste variações de título com pergunta ("Como…?"), número ("5 formas de…") ou promessa direta ("Veja como…")`,
            `Monitore o CTR semanalmente no Search Console`,
          ]),
          potencial:`+${extras.reduce((s,k)=>s+Math.round(k.impressoes*Math.max(0,(0.035-k.ctr/100))),0).toLocaleString('pt-BR')} cliques adicionais/mês ao elevar CTR médio para ~3,5%`,
        });
      }

      if(ga4Bounce>55)
        acoes.push({
          prioridade:ga4Bounce>65?'alta':'média',zona:'Conversão & UX',prazo:'2-3 semanas',icone:'🎯',
          titulo:`Reduzir bounce rate de ${ga4Bounce.toFixed(1)}% — usuários chegam mas não ficam`,
          contexto:`Bounce rate de ${ga4Bounce.toFixed(1)}% significa que ~${Math.round(ga4Total*ga4Bounce/100).toLocaleString('pt-BR')} visitantes/mês saem sem interagir com mais nada. ${ga4Bounce>65?'Nível crítico — as páginas de entrada não estão entregando o que o usuário espera.':'Acima do ideal (meta: <55%) — melhorias de UX podem segurar mais usuários e aumentar conversões.'}`,
          passos:[
            `Abra o GA4 → Relatórios → Engajamento → Páginas de destino — identifique as 3-5 páginas com maior bounce e maior tráfego`,
            `Em cada uma: adicione um botão CTA visível nos primeiros 300px da página (acima do fold) com texto direto: "Fale com a gente", "Solicitar demonstração" etc`,
            `Verifique a velocidade no PageSpeed Insights (meta: >80 pontos mobile) — imagens sem compressão são a causa mais comum de saída`,
            `Adicione links internos em destaque no corpo do texto para direcionar para outras páginas relevantes`,
            `Inclua bloco "Leia também" ou "Conteúdo relacionado" ao final de cada artigo`,
            `Considere um pop-up leve de captura de lead (aparece após 30s ou 50% de scroll) com oferta de valor`,
          ],
          potencial:`Meta <55% bounce = +${Math.round(ga4Total*(ga4Bounce-55)/100*0.25).toLocaleString('pt-BR')} sessões engajadas/mês`,
        });

      if(smDef.length>0)
        acoes.push({
          prioridade:'média',zona:'Defesa SEO',prazo:'1 mês',icone:'🛡️',
          titulo:`Proteger ${smDef.length} keyword(s) no top 3 contra concorrentes`,
          contexto:`Posições no top 3 são valiosas e podem ser tomadas por concorrentes que publicam conteúdo mais atualizado. As keywords ${smDef.map(k=>`"${k.kw}" (#${k.posicao})`).join(', ')} precisam de manutenção ativa.`,
          passos:[
            `Configure alerta de posição para essas keywords no Search Console (Desempenho → filtrar por query)`,
            `Atualize o conteúdo das páginas que rankeiam: adicione dados de 2025/2026, novos exemplos, seções novas`,
            `Adicione schema markup (FAQ, Article, BreadcrumbList) nas páginas que ainda não têm`,
            `Fortaleça os links internos: garanta que pelo menos 3 outros posts do site linkam para cada página do top 3`,
            `Verifique mensalmente se concorrentes estão subindo para essas posições`,
          ],
          potencial:`Manter ${smTraf.toLocaleString('pt-BR')} visitas/mês de tráfego orgânico conquistado`,
        });

      if(topDir&&topDir.traffic>smTraf*2)
        acoes.push({
          prioridade:'média',zona:'Competitivo',prazo:'2-3 meses',icone:'🔭',
          titulo:`Fechar gap com ${topDir.domain} — ${Math.round(topDir.traffic/Math.max(smTraf,1))}x mais tráfego orgânico`,
          contexto:`${topDir.domain} tem ${topDir.traffic.toLocaleString('pt-BR')} visitas/mês vs ${smTraf.toLocaleString('pt-BR')} da Helena — ${(topDir.traffic-smTraf).toLocaleString('pt-BR')} visitas de diferença. Eles rankeiam para ${topDir.keywords.toLocaleString('pt-BR')} keywords. Parte desse volume pode ser capturado mapeando onde eles são fracos.`,
          passos:[
            `No SEMrush → "Keyword Gap" → compare helenacrm.com vs ${topDir.domain}`,
            `Filtre: keywords onde ${topDir.domain} está pos 1-10 e Helena não aparece (ou está acima de pos 20)`,
            `Priorize keywords com dificuldade < 35 e volume > 300/mês`,
            `Para cada keyword priorizada: crie um artigo otimizado ou adapte uma página existente`,
            `Meta: publicar 2 artigos/mês nessas keywords por 3 meses consecutivos`,
            `Monitore o progresso mensalmente no SEMrush`,
          ],
          potencial:`Reduzir gap competitivo + capturar demanda que hoje vai para ${topDir.domain}`,
        });

      if(paginasCapturar.length>0){
        const p=paginasCapturar[0];
        const slug=p.url.replace(/^https?:\/\/[^/]+/,'').replace(/\/$/,'')||'/';
        const topKws=[...p.capturar].sort((a,b)=>b.vol-a.vol).slice(0,3);
        acoes.push({
          prioridade:'média',zona:'Conteúdo · Página',prazo:'2-4 semanas',icone:'📝',
          titulo:`Enriquecer "${slug}" — ${p.capturar.length} keywords entre pos 21+ esperando empurrão`,
          contexto:`O Google já entende que a página fala sobre esses temas (por isso aparece), mas ainda não a considera boa o suficiente para o top 20. Com mais conteúdo de qualidade, é possível subir as keywords da zona Capturar para Atacar em 4-8 semanas.`,
          passos:[
            `Abra a página "${slug}" no CMS`,
            `Identifique lacunas: compare seu conteúdo com os 3 primeiros resultados do Google para "${topKws[0]?.kw}"`,
            `Adicione novas seções H2/H3 para cobrir: ${topKws.map(k=>`"${k.kw}"`).join(', ')}`,
            `Cada nova seção deve ter: heading com a keyword + pelo menos 200 palavras de conteúdo relevante e original`,
            `Inclua imagens com alt text contendo as keywords`,
            `Atualize a data de publicação e submeta a URL para reindexação no Search Console`,
            `Monitore a movimentação das keywords em 3-4 semanas no SEMrush`,
          ],
          potencial:`${p.capturar.length} keywords subindo para zona Atacar = visibilidade para ${p.totalVol.toLocaleString('pt-BR')} buscas/mês`,
        });
      }

      if(orgRatio<30)
        acoes.push({
          prioridade:'baixa',zona:'Estratégia de Conteúdo',prazo:'3-6 meses',icone:'📅',
          titulo:`Canal orgânico em ${orgRatio.toFixed(0)}% — construir base para reduzir dependência de ads`,
          contexto:`Atualmente ${orgRatio.toFixed(0)}% das sessões vêm de orgânico. Com uma estratégia consistente de conteúdo focada nas keywords da zona Atacar, é possível aumentar esse percentual e reduzir o custo de aquisição a longo prazo.`,
          passos:[
            `Defina calendário editorial: 2-4 artigos/mês`,
            `Priorize as keywords da zona Atacar com maior volume: ${smAtacar.slice(0,3).map(k=>`"${k.kw}" #${k.posicao} (${k.volume.toLocaleString('pt-BR')}/mês)`).join(', ')}`,
            `Use estrutura pilar + cluster: 1 artigo longo principal (2.000+ palavras) + 3-4 artigos secundários interligados`,
            `Distribua cada artigo publicado em LinkedIn, newsletter e outros canais sociais`,
            `Acompanhe o crescimento orgânico mensalmente no GA4 — meta: orgânico > 35% do total`,
          ],
          potencial:`Meta orgânico >35% = custo de aquisição 3-5x menor que canais pagos a longo prazo`,
        });

      // Leads-specific actions
      if(leadsOk&&mqlRate<10&&lTotal>=10)
        acoes.push({
          prioridade:'alta',zona:'Funil · Qualificação',prazo:'Imediato',icone:'🎯',
          titulo:`Taxa MQL+SQL de ${mqlRate.toFixed(1)}% — apenas ${lMql+lSql} de ${lTotal} leads avançam no funil`,
          contexto:`A média saudável para SaaS é 15-25% de leads chegando a MQL. Com ${lTotal} leads no período e só ${mqlRate.toFixed(1)}% qualificando, há uma perda significativa de oportunidade no topo do funil.`,
          passos:[
            `Revise o formulário de captura — perguntas qualificadoras (segmento, tamanho da equipe, urgência) filtram leads frios na entrada`,
            `Configure sequência de nutrição automática para leads novos (3-5 e-mails em 2 semanas)`,
            `Defina critério claro de MQL no CRM: ex. lead que acessou página de preços + abriu e-mail + tem CNPJ ativo`,
            `Implante lead scoring básico: +10 pts por visita ao site, +20 pts por demo solicitada, +5 pts por e-mail aberto`,
            `Revise mensagem dos anúncios — promessa do ad deve alinhar com a oferta real para atrair lead mais qualificado`,
          ],
          potencial:`Dobrar a taxa MQL para ~${(mqlRate*2).toFixed(0)}% = +${Math.round(lTotal*mqlRate/100)} oportunidades quentes adicionais`,
        });

      if(leadsOk&&pagoRate>75&&lOrg>0)
        acoes.push({
          prioridade:'média',zona:'Diversificação · Canal',prazo:'2-3 meses',icone:'⚖️',
          titulo:`${pagoRate.toFixed(0)}% dos leads vêm de tráfego pago — reduzir dependência`,
          contexto:`Atualmente ${Math.round(lPago)} leads pagos vs ${Math.round(lOrg)} orgânicos. Alta dependência de ads significa que qualquer corte de budget para o pipeline de leads. Orgânico já traz ${orgLeadRate.toFixed(0)}% dos leads com custo zero.`,
          passos:[
            `Identifique as campanhas de ads com menor ROI — redirecione budget para conteúdo orgânico`,
            `Publique 2 artigos/mês focados nas keywords da zona Atacar que têm intenção comercial`,
            `Invista em SEO técnico: velocidade de página, schema markup, link building interno`,
            `Ative e-mail marketing para reativar base existente sem custo de aquisição`,
            `Meta: elevar leads orgânicos de ${orgLeadRate.toFixed(0)}% para >35% em 3 meses`,
          ],
          potencial:`Reduzir CAC em 30-50% ao equilibrar mix pago × orgânico`,
        });

      if(leadsOk&&wlRate<20&&lTotal>=10)
        acoes.push({
          prioridade:'média',zona:'Segmento · White Label',prazo:'1-2 meses',icone:'🏷️',
          titulo:`White Label representa ${wlRate.toFixed(0)}% dos leads — oportunidade de crescimento`,
          contexto:`Leads WL têm ticket médio maior e geram receita recorrente mais previsível. Com apenas ${Math.round(lWl)} leads WL de ${lTotal} totais (${wlRate.toFixed(0)}%), há espaço para crescer esse segmento estrategicamente.`,
          passos:[
            `Crie landing page dedicada para o modelo White Label com benefícios para agências`,
            `Separe campanhas de ads com criativos específicos para o público de agências e revendas`,
            `Produza conteúdo de funil médio voltado a agências: "Como criar seu CRM White Label", cases de parceiros`,
            `Configure segmentação no CRM: leads WL entram em fluxo de nutrição específico para revendas`,
            `Programe webinar ou demonstração ao vivo mensal voltado a interessados no modelo WL`,
          ],
          potencial:`Elevar WL de ${wlRate.toFixed(0)}% para >30% do mix = crescimento de receita de alto valor`,
        });

      // === RESUMO EXECUTIVO DINÂMICO ===
      const topAtak=smAtacar[0];
      const ondeEstaBem=[];
      if(gscCtr>=3) ondeEstaBem.push(`CTR de ${gscCtr.toFixed(1)}% acima da média do mercado`);
      if(smDef.length>0) ondeEstaBem.push(`${smDef.length} keyword(s) consolidadas no top 3 do Google`);
      if(ga4Bounce<55) ondeEstaBem.push(`Bounce rate de ${ga4Bounce.toFixed(1)}% dentro do esperado para SaaS`);
      if(smAtacar.length>5) ondeEstaBem.push(`${smAtacar.length} keywords na zona Atacar mostram crescimento de autoridade`);
      if(gscImp>100000) ondeEstaBem.push(`${gscImp.toLocaleString('pt-BR')} impressões em ${diasApi} dias — boa visibilidade no Google`);
      if(leadsOk&&mqlRate>=15) ondeEstaBem.push(`Taxa MQL+SQL de ${mqlRate.toFixed(1)}% — funil com boa qualificação`);
      if(leadsOk&&wlRate>=25) ondeEstaBem.push(`${wlRate.toFixed(0)}% dos leads são White Label — segmento de alto valor ativo`);
      if(leadsOk&&orgLeadRate>=30) ondeEstaBem.push(`${orgLeadRate.toFixed(0)}% dos leads vêm de orgânico — aquisição sustentável`);
      if(ondeEstaBem.length===0) ondeEstaBem.push('Dados conectados e monitoramento ativo de todos os canais');

      const maioresOps=[];
      if(topAtak) maioresOps.push(`"${topAtak.kw}" em #${topAtak.posicao} com ${topAtak.volume.toLocaleString('pt-BR')} buscas/mês — maior oportunidade SEO agora`);
      if(gscLowCtr.length>0) maioresOps.push(`${gscLowCtr.length} páginas perdendo cliques por snippets fracos — ganho rápido sem criar conteúdo`);
      if(ga4Bounce>55) maioresOps.push(`Bounce de ${ga4Bounce.toFixed(1)}% indica gap de UX/conversão nas páginas de entrada`);
      if(leadsOk&&mqlRate<10) maioresOps.push(`Taxa MQL de ${mqlRate.toFixed(1)}% — otimizar qualificação pode dobrar oportunidades quentes`);
      if(leadsOk&&pagoRate>75) maioresOps.push(`${pagoRate.toFixed(0)}% de leads pagos — diversificar canal reduz risco e CAC`);
      if(topDir&&topDir.traffic>smTraf*2) maioresOps.push(`${topDir.domain} com ${topDir.traffic.toLocaleString('pt-BR')} visitas/mês — concorrente direto a fechar gap`);

      const proximosPassos=[];
      if(leadsOk&&mqlRate<10) proximosPassos.push(`Revisar critério de MQL no CRM — taxa atual de ${mqlRate.toFixed(1)}% está abaixo do ideal`);
      if(topAtak) proximosPassos.push(`Otimizar "${topAtak.kw}" — H1, meta description e FAQ schema`);
      if(gscLowCtr.length>0) proximosPassos.push(`Reescrever title/meta das ${gscLowCtr.length} páginas com CTR < 2%`);
      if(smDef.length>0) proximosPassos.push(`Monitorar keywords top 3 — defesa de posição conquistada`);
      if(topCapt.length>0) proximosPassos.push(`Planejar artigo para "${topCapt[0]?.kw}" (${topCapt[0]?.volume?.toLocaleString('pt-BR')}/mês)`);
      if(leadsOk&&wlRate<20) proximosPassos.push(`Criar LP dedicada para White Label — segmento com maior valor de contrato`);

      const pColor=p=>p==='alta'?'#dc2626':p==='média'?'#d97706':'#6366f1';
      const pBg=p=>p==='alta'?'#fef2f2':p==='média'?'#fffbeb':'#eef2ff';
      const pBorder=p=>p==='alta'?'#fecaca':p==='média'?'#fde68a':'#c7d2fe';

      return (
        <div style={{display:'flex',flexDirection:'column',gap:20}}>

          {/* Status bar */}
          <div style={{background:dataOk?'rgba(16,185,129,.08)':'rgba(245,158,11,.08)',border:`1px solid ${dataOk?'rgba(16,185,129,.3)':'rgba(245,158,11,.3)'}`,borderRadius:10,padding:'10px 16px',display:'flex',alignItems:'center',gap:10,flexWrap:'wrap'}}>

                    <p style={{fontSize:11,color:'#78350f',margin:'2px 0 0'}}>Crie as abas <strong>Plano_Acao</strong>, <strong>Historico_Mudancas</strong>, <strong>Snapshots_Mensais</strong> e <strong>Insights</strong> na sua planilha para começar a gerenciar suas ações de marketing aqui.</p>

            const cntCurso=plano.filter(p=>statusNorm(p.status)==='em_curso').length;
            const cntConcl=plano.filter(p=>statusNorm(p.status)==='concluido').length;

            const bgPrio =(p)=>{const x=String(p||'').toLowerCase();return x.includes('alta')?'#fef2f2':x.includes('média')||x.includes('media')?'#fffbeb':'#eef2ff';};
            const corStat=(s)=>{const x=statusNorm(s);return x==='concluido'?'#059669':x==='em_curso'?'#0891b2':x==='cancelado'?'#94a3b8':'#6366f1';};

                                </div>

                                </div>
                              </div>

                              <td style={{padding:'8px 10px',fontWeight:600,color:'#059669'}}>{s.conv||s['conv_%']||s.conv_pct||'—'}</td>
                              <td style={{padding:'8px 10px',color:'#64748b',fontSize:11,maxWidth:260}}>{s.observacoes||s.observações||'—'}</td>
                            </tr>
                          ))}
                        </tbody>
                      </table>
                    </div>
                  </div>

                          <h4 style={{fontSize:14,fontWeight:700,color:'#1e293b',margin:0}}>Histórico de Mudanças</h4>
                          <p style={{fontSize:11,color:'#94a3b8',margin:'2px 0 0'}}>O que foi alterado e o resultado</p>
