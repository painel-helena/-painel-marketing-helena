    function useChart(ref,config,deps){
      const cRef=useRef(null);
      useEffect(()=>{
        if(!ref.current) return;
        if(cRef.current) cRef.current.destroy();
        cRef.current=new Chart(ref.current,config);
        return ()=>{ if(cRef.current){cRef.current.destroy();cRef.current=null;} };
      },deps);
    }

    const DonutChart=({data,h=220})=>{
      const ref=useRef(null);
      useChart(ref,{type:'doughnut',
        data:{labels:data.map(d=>d.name),datasets:[{data:data.map(d=>d.value),

        data:{labels,datasets:datasets.map(d=>({...d,tension:0.4,fill:true,pointRadius:3,pointHoverRadius:5,borderWidth:2}))},
        options:{responsive:true,maintainAspectRatio:false,
          scales:{x:{grid:{display:false},ticks:{font:{family:'Inter',size:11},color:'#94a3b8'}},
            y1:{type:'linear',position:'left',grid:{color:'#f1f5f9'},ticks:{font:{family:'Inter',size:11},color:'#94a3b8'}},
            y2:{type:'linear',position:'right',grid:{drawOnChartArea:false},ticks:{font:{family:'Inter',size:11},color:'#94a3b8'}}},
          plugins:{legend:{labels:{font:{family:'Inter',size:12},color:'#64748b',usePointStyle:true,pointStyleWidth:8}},
            tooltip:TTstyle}}
      },[JSON.stringify({labels,datasets})]);
      return <canvas ref={ref} style={{maxHeight:h}} />;
    };

    /* ══════════════════════════════════════════════
       UI COMPONENTS
    ══════════════════════════════════════════════ */

    const IBG={indigo:'#eef2ff',green:'#ecfdf5',amber:'#fffbeb',purple:'#f5f3ff',cyan:'#ecfeff',red:'#fef2f2'};
    const ITC={indigo:'#4338ca',green:'#047857',amber:'#b45309',purple:'#7c3aed',cyan:'#0e7490',red:'#b91c1c'};

    const InfoTip=({texto})=>{
      const [show,setShow]=React.useState(false);
      return (
        <span style={{position:'relative',display:'inline-flex',alignItems:'center',verticalAlign:'middle'}}>
          <span onMouseEnter={()=>setShow(true)} onMouseLeave={()=>setShow(false)}
            style={{display:'inline-flex',alignItems:'center',justifyContent:'center',
              width:14,height:14,borderRadius:'50%',background:'#e2e8f0',color:'#64748b',
              fontSize:8,fontWeight:800,cursor:'help',marginLeft:5,flexShrink:0,
              lineHeight:1,userSelect:'none',transition:'background .15s'
            }}>i</span>
          {show&&(
            <div style={{position:'absolute',bottom:'calc(100% + 8px)',left:'50%',transform:'translateX(-50%)',
              background:'#1e293b',color:'#cbd5e1',fontSize:11,lineHeight:1.55,
              padding:'10px 13px',borderRadius:9,width:240,zIndex:999,
              boxShadow:'0 4px 20px rgba(0,0,0,.3)',pointerEvents:'none',whiteSpace:'normal'}}>
              <div style={{position:'absolute',bottom:-5,left:'50%',transform:'translateX(-50%)',
                width:10,height:6,background:'#1e293b',clipPath:'polygon(0 0,100% 0,50% 100%)'}}/>
              {texto}
            </div>
          )}
        </span>
      );
    };

    const MetricCard=({title,value,sub,trend,cor='indigo',icon,info})=>(
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between'}}>
          <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',margin:0}}>
            {title}{info&&<InfoTip texto={info}/>}
          </p>
          {icon&&<div style={{background:IBG[cor],color:ITC[cor],padding:7,borderRadius:8,display:'flex'}}>{icon}</div>}
        </div>
        <p style={{fontSize:26,fontWeight:800,color:'#0f172a',margin:'6px 0 2px'}}>{value}</p>
        {sub&&<p style={{fontSize:11,color:'#94a3b8',margin:0}}>{sub}</p>}
        {trend!==undefined&&(
          <span className={trend>=0?'badge-up':'badge-dn'} style={{display:'inline-block',marginTop:6}}>
            {trend>=0?'↑':'↓'} {Math.abs(trend)}% vs. anterior
          </span>
        )}
      </div>
    );

    const Bloco=({titulo,sub,children,csvDados,csvNome,info})=>(
      <div className="card" style={{padding:20}}>
        <div style={{display:'flex',alignItems:'flex-start',justifyContent:'space-between',marginBottom:16}}>
          <div>
            <h4 style={{fontSize:13,fontWeight:700,color:'#1e293b',margin:0}}>
              {titulo}{info&&<InfoTip texto={info}/>}
            </h4>
            {sub&&<p style={{fontSize:11,color:'#94a3b8',margin:'2px 0 0'}}>{sub}</p>}
          </div>
          {csvDados&&<button onClick={()=>exportarCSV(csvDados,csvNome)}
            style={{fontSize:11,border:'1px solid #c7d2fe',color:'#6366f1',background:'none',borderRadius:7,padding:'4px 10px',cursor:'pointer',whiteSpace:'nowrap',flexShrink:0}}>
            ↓ CSV</button>}
        </div>
        {children}
      </div>
    );

    const Svg=({d,s=18})=><svg style={{width:s,height:s}} fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth={2} d={d}/></svg>;
    const IUsers=()=><Svg d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>;
    const IAds=()=><Svg d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z"/>;
    const IOrg=()=><Svg d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>;
    const IWL=()=><Svg d="M19 21V5a2 2 0 00-2-2H7a2 2 0 00-2 2v16m14 0h2m-2 0h-5m-9 0H3m2 0h5M9 7h1m-1 4h1m4-4h1m-1 4h1m-5 10v-5a1 1 0 011-1h2a1 1 0 011 1v5m-4 0h4"/>;
    const IEye=()=><Svg d="M15 12a3 3 0 11-6 0 3 3 0 016 0zM2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>;
    const IClick=()=><Svg d="M15 15l-2 5L9 9l11 4-5 2zm0 0l5 5"/>;
    const IMail=()=><Svg d="M3 8l7.89 5.26a2 2 0 002.22 0L21 8M5 19h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"/>;
    const IChart=()=><Svg d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/>;
    const IDl=()=><Svg d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>;
    const ICal=()=><Svg d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"/>;

    /* ══════════════════════════════════════════════
       TABELA PADRÃO
    ══════════════════════════════════════════════ */

    const Tabela=({cols,rows,renderRow})=>(
      <div style={{overflowX:'auto'}}>
        <table style={{width:'100%',borderCollapse:'collapse',fontSize:13}}>
          <thead><tr style={{borderBottom:'1px solid #f1f5f9'}}>
            {cols.map((c,i)=>(
              <th key={i} style={{padding:'8px 12px',fontSize:10,fontWeight:700,color:'#94a3b8',
                textTransform:'uppercase',textAlign:c.right?'right':'left'}}>{c.label}</th>
            ))}
          </tr></thead>
          <tbody>{rows.map((r,i)=>(
            <tr key={i} style={{borderBottom:'1px solid #f8fafc'}}>{renderRow(r,i)}</tr>
          ))}</tbody>
        </table>
      </div>
    );

    const Td=({children,right,mono,bold})=>(
      <td style={{padding:'9px 12px',textAlign:right?'right':'left',
        fontFamily:mono?'monospace':'Inter',fontSize:mono?12:13,
        fontWeight:bold?700:400,color:bold?'#0f172a':'#374151'}}>{children}</td>
    );

    /* ══════════════════════════════════════════════
       ABA 1 — LEADS
       ⚠ Segmentação CF/WL só da planilha Helena CRM
    ══════════════════════════════════════════════ */

    const AbaLeads=({de,ate,tipo,api})=>{
      const ld = api?.leads || {};

      // Convert Date to YYYYMM key for period filtering
      const toMK = d => d ? String(d.getFullYear()) + String(d.getMonth()+1).padStart(2,'0') : '';
      const startKey = toMK(de);
      const endKey   = toMK(ate);

      // All months (for trend charts — always full history)
      const allMonths = ld.porMes || [];

      // Filter porMes by selected period (for totals/cards only)
      const filteredMonths = allMonths.filter(m =>
        (!startKey || m.mesKey >= startKey) && (!endKey || m.mesKey <= endKey)
      );

      // Sum all metric fields from filtered months
      const sum = f => filteredMonths.reduce((s,m) => s+(m[f]||0), 0);
      const total    = sum('total');
      const leadCnt  = sum('lead');
      const mqlCnt   = sum('mql');
      const sqlCnt   = sum('sql');
      const wl       = sum('wl');
      const cf       = sum('cf');
      const pago     = sum('pago');
      const organico = sum('organico');
      const cfLead   = sum('cf_lead');
      const cfMql    = sum('cf_mql');
      const cfSql    = sum('cf_sql');
      const wlLead   = sum('wl_lead');
      const wlMql    = sum('wl_mql');
      const wlSql    = sum('wl_sql');

      // Canal breakdown from porCanalMes filtered by period
      const canalMapFull = {};
      (ld.porCanalMes||[])
        .filter(c => (!startKey || c.mesKey >= startKey) && (!endKey || c.mesKey <= endKey))
        .forEach(c => {
          if (!canalMapFull[c.canal]) canalMapFull[c.canal] = { count:0, cf:0, wl:0, mql:0, sql:0, tipoOrigem: c.tipoOrigem };
          const e = canalMapFull[c.canal];
          e.count += c.count; e.cf += (c.cf||0); e.wl += (c.wl||0);
          e.mql   += (c.mql||0); e.sql += (c.sql||0);
        });
      const canaisPie = Object.entries(canalMapFull)
        .sort((a,b) => b[1].count - a[1].count)
        .map(([name,v],i) => ({name, value:v.count, cf:v.cf, wl:v.wl, mql:v.mql, sql:v.sql, tipoOrigem:v.tipoOrigem, color:CORES[i%CORES.length]}));

      const tipoPie = [
        {name:'Cliente Final', value:cf, color:'#6366f1'},
        {name:'White Label',   value:wl, color:'#10b981'},
      ];

      const monthlyData = allMonths; // sempre histórico completo nos gráficos

      // Filter recentes by exact date range
      const parseData = s => { if(!s) return null; const [d,m,y]=s.split('/'); return new Date(+y,+m-1,+d); };
      const deTime  = de  ? new Date(de.getFullYear(), de.getMonth(), de.getDate()).getTime() : null;
      const ateTime = ate ? new Date(ate.getFullYear(),ate.getMonth(),ate.getDate(),23,59,59).getTime() : null;
      const recentes = (ld.recentes||[]).filter(l => {
        const d = parseData(l.data); if(!d) return true;
        if(deTime  && d.getTime() < deTime)  return false;
        if(ateTime && d.getTime() > ateTime) return false;
        return true;
      });

      const hasLeads = allMonths.length > 0;

      // porCanal e porConteudo (disponíveis após atualização do Apps Script)
      const porCanal    = ld.porCanal    || [];
      const porConteudo = ld.porConteudo || [];

      // Tipo de origem por canal (pago vs orgânico) do porCanalMes
      const canalTipoMap = {};
      (ld.porCanalMes||[]).forEach(c => { canalTipoMap[c.canal] = c.tipoOrigem; });

      // MoM: último mês vs penúltimo dentro do período filtrado
      const sortedMo = [...filteredMonths].sort((a,b) => a.mesKey > b.mesKey ? 1 : -1);
      const lastMo = sortedMo[sortedMo.length-1];
      const prevMo = sortedMo[sortedMo.length-2];
      const momPct = lastMo && prevMo && prevMo.total > 0
        ? ((lastMo.total - prevMo.total) / prevMo.total * 100) : null;

      // Taxas de qualidade do período filtrado
      const cfConvRate  = cf > 0  ? (cfMql+cfSql)/cf*100   : 0;
      const wlConvRate  = wl > 0  ? (wlMql+wlSql)/wl*100   : 0;
      const cfSqlRate   = cf > 0  ? cfSql/cf*100            : 0;
      const wlSqlRate   = wl > 0  ? wlSql/wl*100            : 0;
      const overallConv = total > 0 ? (mqlCnt+sqlCnt)/total*100 : 0;

      // Insights automáticos baseados nos dados reais
      const autoInsights = [];
      if (momPct !== null) {
        if (momPct >= 5)  autoInsights.push({ic:'📈',cor:'#059669',bg:'#ecfdf5',bdr:'#bbf7d0',txt:`Leads cresceram +${momPct.toFixed(1)}% em ${lastMo.mes} vs ${prevMo.mes} — tendência positiva.`});
        else if (momPct <= -5) autoInsights.push({ic:'📉',cor:'#dc2626',bg:'#fef2f2',bdr:'#fecaca',txt:`Leads caíram ${momPct.toFixed(1)}% em ${lastMo.mes} — investigar causa e ajustar acionamentos.`});
      }
      if (total > 0 && overallConv < 25) autoInsights.push({ic:'⚠️',cor:'#d97706',bg:'#fffbeb',bdr:'#fde68a',txt:`Taxa MQL+SQL de ${overallConv.toFixed(1)}% está abaixo do ideal (≥25%). Revisar qualificação no CRM.`});
      if (cf > 0 && wl > 0) {
        if (wlConvRate > cfConvRate + 8) autoInsights.push({ic:'💡',cor:'#6366f1',bg:'#eef2ff',bdr:'#c7d2fe',txt:`WL converte ${wlConvRate.toFixed(1)}% vs CF ${cfConvRate.toFixed(1)}% — leads de parceiros têm qualidade superior. Priorize WL.`});
        if (cfConvRate > wlConvRate + 8) autoInsights.push({ic:'💡',cor:'#6366f1',bg:'#eef2ff',bdr:'#c7d2fe',txt:`CF converte ${cfConvRate.toFixed(1)}% vs WL ${wlConvRate.toFixed(1)}% — Cliente Final está mais qualificado. Aumentar volume CF.`});
      }
      if (canaisPie.length > 0 && total > 0 && canaisPie[0].value/total > 0.55) autoInsights.push({ic:'🔴',cor:'#dc2626',bg:'#fef2f2',bdr:'#fecaca',txt:`${canaisPie[0].name} concentra ${((canaisPie[0].value/total)*100).toFixed(0)}% dos leads — dependência alta. Diversifique canais.`});
      if (pago > 0 && organico > 0 && organico/total > 0.6) autoInsights.push({ic:'🌱',cor:'#059669',bg:'#ecfdf5',bdr:'#bbf7d0',txt:`${((organico/total)*100).toFixed(0)}% dos leads são orgânicos — SEO e conteúdo funcionam. Considere escalar com ads.`});
      if (porConteudo.length === 0 && hasLeads) autoInsights.push({ic:'🔧',cor:'#6366f1',bg:'#eef2ff',bdr:'#c7d2fe',txt:`Atualize o Apps Script para ver quais campanhas e páginas geram mais leads CF vs WL.`});

      return (
        <div style={{display:'flex',flexDirection:'column',gap:16}}>

          {hasLeads
            ? <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:'9px 14px',display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:14}}>✅</span>
                <p style={{fontSize:12,fontWeight:600,color:'#166534',margin:0}}>Dados reais · {fmt(total)} leads da planilha HelenaCRM · {fmtDate(de)} – {fmtDate(ate)}</p>
              </div>
            : <div style={{background:'#fffbeb',border:'1px solid #fde68a',borderRadius:10,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
                <span style={{fontSize:16}}>📋</span>
                <div>
                  <p style={{fontSize:12,fontWeight:600,color:'#92400e',margin:0}}>Conectando planilha HelenaCRM…</p>
                  <p style={{fontSize:11,color:'#a16207',margin:'2px 0 0'}}>Aguarde o carregamento dos dados reais de leads.</p>
                </div>
              </div>
          }

          {/* Totais */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(145px,1fr))',gap:12}}>
            <MetricCard title="Total de Leads"  value={fmt(total)}    sub={`${fmtDate(de)} – ${fmtDate(ate)}`} cor="indigo" icon={<IUsers/>}
              info="Total de leads válidos no período (etiqueta CF ou WL no CRM). Fonte: Planilha Helena CRM."/>
            <MetricCard title="Cliente Final"   value={fmt(cf)}       sub={pct(total?cf/total*100:0)+' do total'}       cor="indigo" icon={<IUsers/>}
              info="Leads com etiqueta 'LEAD CLIENTE FINAL' no CRM. Período: filtro selecionado."/>
            <MetricCard title="White Label"     value={fmt(wl)}       sub={pct(total?wl/total*100:0)+' do total'}       cor="amber"  icon={<IWL/>}
              info="Leads com etiqueta '4'LEAD P WHITE LABEL' no CRM — parceiros e revendedores. Período: filtro selecionado."/>
            <MetricCard title="Via Ads (Pago)"  value={fmt(pago)}     sub={pct(total?pago/total*100:0)+' do total'}     cor="purple" icon={<IAds/>}
              info="Meta: campanha com _SM_/_IG_/_LP_/_INT., IA/WL ou ID numérico. Google Ads: anúncio preenchido (WhiteLabel1/2), campanha WL/WL2. Instagram: campanha ≠ PLANOS."/>
            <MetricCard title="Via Orgânico"    value={fmt(organico)} sub={pct(total?organico/total*100:0)+' do total'} cor="green"  icon={<IOrg/>}
              info="Linktree, ChatGPT, Widget (sempre orgânico). Google sem anúncio/WL. Instagram com PLANOS ou sem campanha. Qualquer origem sem padrão de ads."/>
          </div>

          {/* Funil por Tipo — CF × WL */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
            {[
              {label:'Cliente Final', tot:cf, l:cfLead, m:cfMql, s:cfSql, cor:'#6366f1', bg:'#eef2ff', bgS:'#ecfdf5', bgM:'#eef2ff'},
              {label:'White Label',   tot:wl, l:wlLead, m:wlMql, s:wlSql, cor:'#10b981', bg:'#f0fdf4', bgS:'#ecfdf5', bgM:'#f0fdf4'},
            ].map(({label,tot,l,m,s,cor})=>(
              <div key={label} className="card" style={{padding:16}}>
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:12}}>
                  <div>
                    <p style={{fontSize:11,fontWeight:700,color:'#64748b',textTransform:'uppercase',letterSpacing:'.05em',margin:0}}>{label}</p>
                    <p style={{fontSize:22,fontWeight:800,color:'#0f172a',margin:'4px 0 0'}}>{fmt(tot)}</p>
                  </div>
                  <span style={{fontSize:11,background:'#f1f5f9',color:'#475569',padding:'3px 8px',borderRadius:6,fontWeight:600}}>{pct(total?tot/total*100:0)}</span>
                </div>
                <div style={{display:'grid',gridTemplateColumns:'repeat(3,1fr)',gap:6}}>
                  {[['LEAD',l,'#64748b','#f8fafc'],['MQL',m,'#4338ca','#eef2ff'],['SQL',s,'#065f46','#ecfdf5']].map(([st,n,tc,bg])=>(
                    <div key={st} style={{textAlign:'center',padding:'8px 4px',background:bg,borderRadius:8}}>
                      <p style={{fontSize:9,fontWeight:700,color:tc,textTransform:'uppercase',letterSpacing:'.06em',margin:'0 0 3px'}}>{st}</p>
                      <p style={{fontSize:18,fontWeight:800,color:'#0f172a',margin:0}}>{fmt(n)}</p>
                      <p style={{fontSize:10,color:'#94a3b8',margin:'2px 0 0'}}>{pct(tot?n/tot*100:0)}</p>
                    </div>
                  ))}
                </div>
              </div>
            ))}
          </div>

          {/* Donuts */}
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:12}}>
            <Bloco titulo="Origem dos Leads" sub="Distribuição por canal de aquisição" csvDados={canaisPie} csvNome="leads-por-canal.csv"
              info="Baseado em UTM/Origem + UTM/Conteúdo da planilha. Direto = leads sem UTM rastreado (WhatsApp, acesso direto, entrada manual no CRM). Período: filtro selecionado.">
              <DonutChart data={canaisPie} h={220}/>
            </Bloco>
            <Bloco titulo="Tipo de Lead" sub="Cliente Final vs White Label · HelenaCRM" csvDados={tipoPie} csvNome="leads-por-tipo.csv"
              info="Classificação pelas tags do CRM: White Label = parceiros/revendedores; demais = Cliente Final. Um lead pode ser CF ou WL, nunca os dois. Período: filtro selecionado.">
              <DonutChart data={tipoPie} h={220}/>
            </Bloco>
          </div>

          {/* Evolução mensal — Opção A: dois gráficos empilhados */}
          {monthlyData.length>0 && (<>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
              <Bloco titulo="Cliente Final · Evolução Mensal" sub="Barras empilhadas por estágio do funil" csvDados={monthlyData} csvNome="cf-evolucao.csv"
                info="Evolução mensal de leads CF por estágio do funil: LEAD (contato), MQL (qualificado pelo marketing), SQL (qualificado para vendas). Exibe histórico completo — não apenas o período selecionado.">
                <BarChart2 stacked
                  labels={monthlyData.map(d=>d.mes)}
                  datasets={[
                    {label:'LEAD', data:monthlyData.map(d=>d.cf_lead||0), backgroundColor:'#cbd5e1'},
                    {label:'MQL',  data:monthlyData.map(d=>d.cf_mql||0),  backgroundColor:'#6366f1'},
                    {label:'SQL',  data:monthlyData.map(d=>d.cf_sql||0),  backgroundColor:'#312e81'},
                  ]} h={220}/>
              </Bloco>
              <Bloco titulo="White Label · Evolução Mensal" sub="Barras empilhadas por estágio do funil" csvDados={monthlyData} csvNome="wl-evolucao.csv"
                info="Evolução mensal de leads WL por estágio do funil: LEAD (contato), MQL (qualificado), SQL (pronto para vendas). Parceiros e revendedores. Histórico completo exibido.">
                <BarChart2 stacked
                  labels={monthlyData.map(d=>d.mes)}
                  datasets={[
                    {label:'LEAD', data:monthlyData.map(d=>d.wl_lead||0), backgroundColor:'#6ee7b7'},
                    {label:'MQL',  data:monthlyData.map(d=>d.wl_mql||0),  backgroundColor:'#10b981'},
                    {label:'SQL',  data:monthlyData.map(d=>d.wl_sql||0),  backgroundColor:'#065f46'},
                  ]} h={220}/>
              </Bloco>
            </div>

            {/* Opção B: Tabela heatmap */}
            <Bloco titulo="Funil por Mês — Visão Detalhada" sub="Intensidade de cor proporcional ao volume · CF = índigo · WL = verde" csvDados={monthlyData} csvNome="funil-mensal.csv"
              info="Tabela com todos os meses históricos. Meses dentro do período selecionado são destacados com ● verde. A linha 'Período selecionado' soma apenas os meses filtrados.">
              {(()=>{
                const cols=[
                  {key:'cf_lead',label:'CF · LEAD',color:'#6366f1'},
                  {key:'cf_mql', label:'CF · MQL', color:'#4338ca'},

      const gscTot  = gscOk&&api.gsc.totais ? api.gsc.totais : null;
      const tlImpr  = gscTot ? gscTot.impressoes : (gscOk&&api.gsc.historico?.length ? api.gsc.historico.reduce((s,t)=>s+t.impressoes,0) : null);

      const ctrStr  = gscTot ? gscTot.ctr.toFixed(1)+'%'   : (tlImpr ? (tlCli/tlImpr*100).toFixed(1)+'%' : (gscOk?'—':'4,9%'));
      const posStr  = gscTot ? gscTot.posicao.toFixed(1)+'°' : (gscOk&&api.gsc.keywords?.length ? (api.gsc.keywords.reduce((s,k)=>s+k.posicao,0)/api.gsc.keywords.length).toFixed(1)+'°' : (gscOk?'—':'3,4°'));
      const imprStr = tlImpr ? (tlImpr>=1000?(tlImpr/1000).toFixed(1)+'K':String(tlImpr)) : (gscOk?'—':'87,4K');
      const cliStr  = tlCli  ? fmt(tlCli) : (gscOk?'—':'4.280');

      // GA4 — métricas (usa totais reais sem dimensão; fallback para soma dos canais)
      const ga4Tot  = ga4Ok&&api.ga4.totais ? api.ga4.totais : null;
      const totalSes= ga4Tot ? ga4Tot.sessoes : (ga4Ok ? api.ga4.canais.reduce((s,c)=>s+c.sessoes,0) : null);
      const orgSes  = ga4Ok ? api.ga4.canais.filter(c=>/organic/i.test(c.canal||'')).reduce((s,c)=>s+c.sessoes,0) : null;
      const novosN  = ga4Tot ? ga4Tot.novosUsuarios : (ga4Ok ? api.ga4.canais.reduce((s,c)=>s+c.novosUsuarios,0) : null);
      const bounceS = ga4Tot ? ga4Tot.bounce.toFixed(1)+'%' : (ga4Ok&&totalSes ? (api.ga4.canais.reduce((s,c)=>s+(c.bounce*(c.sessoes/totalSes)),0)).toFixed(1)+'%' : (ga4Ok?'—':'46,2%'));
      const novosS  = totalSes&&novosN ? (novosN/totalSes*100).toFixed(1)+'%' : (ga4Ok?'—':'68,4%');
      const sesStr  = orgSes!==null ? fmt(orgSes) : (ga4Ok?'—':'12.840');

      // Gráfico timeline
      const timeline = gscOk&&api.gsc.historico?.length
        ? api.gsc.historico.slice(-90).map(t=>({sem:t.data.slice(5),impressoes:t.impressoes,cliques:t.cliques}))
        : (gscOk?[]:SEO_SEMANAS);

      // Keywords
      const kwRows = gscOk&&api.gsc.keywords?.length
        ? api.gsc.keywords.map(k=>({kw:k.query,pos:k.posicao,vol:k.impressoes,cli:k.cliques,ctr:k.ctr,var:0}))
        : (gscOk?[]:TOP_KWS);
      const brandKwRows = gscOk&&api.gsc.keywords?.length
        ? api.gsc.keywords.filter(k=>k.query.toLowerCase().includes('helena')).map(k=>({kw:k.query,pos:k.posicao,vol:k.impressoes,cli:k.cliques,ctr:k.ctr,var:0}))
        : (gscOk?[]:BRAND_KWS);

      // Dispositivos
      const colDev={desktop:'#6366f1',mobile:'#10b981',tablet:'#f59e0b'};
      const devData = ga4Ok&&api.ga4.dispositivos?.length
        ? (()=>{const tot=api.ga4.dispositivos.reduce((s,d)=>s+d.sessoes,0);
            return api.ga4.dispositivos.map(d=>({
              name:d.tipo==='desktop'?'Desktop':d.tipo==='mobile'?'Mobile':'Tablet',
              value:Math.round(d.sessoes/tot*100),color:colDev[d.tipo]||'#94a3b8'}));})()
        : (ga4Ok?[]:DEVICES);

      // Canais — agrupados em 6 categorias
      const chData = ga4Ok&&api.ga4.canais?.length
        ? (()=>{
            const grupos={pago:0,organico:0,direto:0,referral:0,email:0,unassigned:0};
            api.ga4.canais.forEach(c=>{
              const k=c.canal||'';
              if(/paid social|paid search/i.test(k))         grupos.pago       +=c.sessoes;
              else if(/organic/i.test(k))                    grupos.organico   +=c.sessoes;
              else if(/direct/i.test(k))                     grupos.direto     +=c.sessoes;
              else if(/referral/i.test(k))                   grupos.referral   +=c.sessoes;
              else if(/email/i.test(k))                      grupos.email      +=c.sessoes;
              else                                           grupos.unassigned +=c.sessoes;
            });
            const tot=Object.values(grupos).reduce((s,v)=>s+v,0)||1;
            const defs=[
              {key:'pago',      name:'Pago',           color:'#ec4899'},
              {key:'organico',  name:'Orgânico',        color:'#10b981'},
              {key:'direto',    name:'Direto',          color:'#6366f1'},
              {key:'referral',  name:'Referral',        color:'#8b5cf6'},
              {key:'email',     name:'E-mail',          color:'#f97316'},
              {key:'unassigned',name:'Não atribuído',   color:'#94a3b8'},
            ];
            return defs.filter(d=>grupos[d.key]>0).map(d=>({
              name:d.name, value:Math.round(grupos[d.key]/tot*100), color:d.color, sessoes:grupos[d.key]
            })).sort((a,b)=>b.value-a.value);
          })()
        : (ga4Ok?[]:CANAIS_AQUISICAO);

      // Páginas
      const topPags = gscOk&&api.gsc.paginas?.length
        ? [...api.gsc.paginas].sort((a,b)=>b.cliques-a.cliques).slice(0,6)
            .map(p=>({url:p.url,ses:p.cliques,bounce:'—',tempo:'—',var:0}))
        : (gscOk?[]:TOP_PAGINAS);
      const botPags = gscOk&&api.gsc.paginas?.length
        ? [...api.gsc.paginas].sort((a,b)=>a.cliques-b.cliques).slice(0,5)
            .map(p=>({url:p.url,ses:p.cliques,bounce:'—',opp:'Otimizar CTR e meta description'}))
        : (gscOk?[]:BOTTOM_PAGINAS);
      const opps = gscOk&&api.gsc.paginas?.length
        ? api.gsc.paginas.filter(p=>p.impressoes>300&&p.ctr<3)
            .sort((a,b)=>b.impressoes-a.impressoes).slice(0,5)
            .map(p=>({url:p.url,impr:p.impressoes,ctr:p.ctr,pos:p.posicao,
              potencial:p.impressoes>1500?'alto':'médio',acao:'Melhorar title tag e meta description'}))
        : (gscOk?[]:OPORTUNIDADES);

      const origensAtivas = ga4Ok&&api.ga4.origens?.length ? api.ga4.origens : null;
      const totalOrigens = origensAtivas ? origensAtivas.reduce((s,o)=>s+o.sessoes,0) : 0;

      return (
      <div style={{display:'flex',flexDirection:'column',gap:16}}>

        {/* Fonte */}
        {(gscOk||ga4Ok) && (
          <div style={{background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:10,padding:'9px 14px',display:'flex',gap:8,alignItems:'center',flexWrap:'wrap'}}>
            <span style={{fontSize:14}}>✅</span>
            <p style={{fontSize:12,fontWeight:600,color:'#166534',margin:0}}>
              Dados reais · {[gscOk&&'GSC',ga4Ok&&'GA4'].filter(Boolean).join(' + ')} · Últimos {diasApi} dias · Atualizado: {api?.atualizado?.slice(0,10)||'—'}
            </p>
          </div>
        )}

        {/* GSC */}
        <div>
          <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Google Search Console</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:12}}>
            <MetricCard title="Impressões"    value={imprStr} sub={`Últimos ${diasApi} dias`} cor="indigo" icon={<IEye/>}
              info={`Total de vezes que o site apareceu nos resultados de busca do Google nos últimos ${diasApi} dias. Fonte: Google Search Console.`}/>
            <MetricCard title="Cliques"       value={cliStr}  sub={`Tráfego orgânico · ${diasApi}d`} cor="green"  icon={<IClick/>}
              info={`Total de cliques orgânicos recebidos pelo site nos últimos ${diasApi} dias. Fonte: Google Search Console.`}/>
            <MetricCard title="CTR Médio"     value={ctrStr}  sub="Taxa de cliques"   cor="amber"  icon={<IChart/>}
              info="Taxa de cliques: percentual de impressões que resultaram em um clique. Calculado sobre o total real do site. Fonte: Google Search Console."/>
            <MetricCard title="Posição Média" value={posStr}  sub="Ranking no Google" cor="purple" icon={<IOrg/>}
              info="Posição média do site nos resultados de busca do Google, ponderada por impressões. Quanto menor o número, melhor o ranking. Fonte: Google Search Console."/>
          </div>
        </div>

        {/* GA4 */}
        <div>
          <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',marginBottom:10}}>Google Analytics 4</p>
          <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(155px,1fr))',gap:12}}>
            <MetricCard title="Sessões Orgânicas" value={sesStr}  sub={`Últimos ${diasApi} dias`} cor="cyan"   icon={<IOrg/>}
              info={`Soma de sessões vindas de canais orgânicos (Organic Search + Organic Social + Organic Video) nos últimos ${diasApi} dias. Fonte: Google Analytics 4.`}/>
            <MetricCard title="Bounce Rate"       value={bounceS} sub="Taxa de rejeição"    cor="amber"  icon={<IClick/>}
              info="Percentual de sessões sem nenhuma interação (clique, scroll, evento). Calculado sobre o total real do site. Meta: abaixo de 55%. Fonte: Google Analytics 4."/>
            <MetricCard title="Novos Usuários"    value={novosS}  sub="Do total de sessões" cor="indigo" icon={<IUsers/>}
              info={`Proporção de sessões de usuários que visitaram o site pela primeira vez nos últimos ${diasApi} dias em relação ao total de sessões. Fonte: Google Analytics 4.`}/>
            <MetricCard title="Total Sessões"     value={totalSes?fmt(totalSes):'—'} sub="Todos os canais" cor="green" icon={<IChart/>}
              info={`Total real de sessões em todos os canais nos últimos ${diasApi} dias, conforme relatório agregado do GA4 (sem dimensão). Fonte: Google Analytics 4.`}/>
          </div>
        </div>

        {/* Dispositivos + Canais */}
        <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(300px,1fr))',gap:12}}>
          <Bloco titulo="Dispositivos" sub="Distribuição das sessões por dispositivo">
            <DonutChart data={devData} h={200}/>
          </Bloco>
          <Bloco titulo="Canais de Aquisição" sub="De onde vêm os visitantes — GA4">
            <DonutChart data={chData} h={200}/>
          </Bloco>
        </div>

        {/* Origem de Acessos */}
        {(origensAtivas||ga4Ok) && (()=>{
          const oriList=origensAtivas||[];
          const totalPagsOrig=Math.ceil(oriList.length/KW_PER_PAGE);
          const btnStyleO=(disabled)=>({padding:'5px 14px',borderRadius:7,border:'1px solid #e2e8f0',background:disabled?'#f8fafc':'#fff',color:disabled?'#cbd5e1':'#374151',fontWeight:600,fontSize:12,cursor:disabled?'default':'pointer'});
          const winO=[];const deltaO=3;
          for(let i=0;i<totalPagsOrig;i++){if(i===0||i===totalPagsOrig-1||Math.abs(i-origPage)<=deltaO)winO.push(i);}
          const pagesO=[];let prevO=-1;
          winO.forEach(i=>{if(prevO>=0&&i-prevO>1)pagesO.push('...');pagesO.push(i);prevO=i;});
          return(
            <Bloco titulo="Origem de Acessos" sub={`Grupo de canais · Origem / Mídia · Últimos ${diasApi} dias — GA4 · ${oriList.length} origens`} csvDados={oriList} csvNome="origens-acessos.csv">
              <div style={{marginBottom:14}}>
                <BarChart2
                  labels={oriList.slice(0,10).map(o=>o.fonte||o.origem)}
                  datasets={[{label:'Sessões',data:oriList.slice(0,10).map(o=>o.sessoes),backgroundColor:'#6366f1'}]}
                  h={220}/>
              </div>
              <Tabela
                cols={[{label:'#'},{label:'Grupo de Canais'},{label:'Origem / Mídia'},{label:'Sessões',right:true},{label:'Usuários',right:true},{label:'Engajamento',right:true}]}
                rows={oriList.slice(origPage*KW_PER_PAGE,(origPage+1)*KW_PER_PAGE)}
                renderRow={(o,i)=>{
                  const pctTotal=totalOrigens>0?+(o.sessoes/totalOrigens*100).toFixed(1):0;
                  const canalColor={'Paid Social':'#ec4899','Organic Search':'#10b981','Direct':'#6366f1','Paid Search':'#f59e0b','Organic Social':'#06b6d4','Referral':'#8b5cf6','Email':'#f97316','Unassigned':'#94a3b8'};
                  const cor=canalColor[o.canal]||'#94a3b8';
                  const [src,med]=(o.origem||o.canal||'').split(' / ');
                  return <>
                    <Td><span style={{fontSize:11,fontWeight:700,color:'#cbd5e1'}}>{origPage*KW_PER_PAGE+i+1}</span></Td>
                    <Td>
                      <span style={{fontSize:11,fontWeight:700,color:cor,background:cor+'18',padding:'2px 8px',borderRadius:10,whiteSpace:'nowrap'}}>
                        {o.canal||src}
                      </span>
                    </Td>
                    <Td>
                      <div style={{display:'flex',alignItems:'center',gap:6}}>
                        <span style={{fontWeight:600,color:'#374151',fontSize:12}}>{src}</span>
                        {med&&<span style={{fontSize:11,background:'#f1f5f9',color:'#64748b',padding:'1px 6px',borderRadius:10}}>{med}</span>}
                      </div>
                      <div style={{fontSize:10,color:'#94a3b8',marginTop:1}}>{pctTotal}% do total</div>
                    </Td>
                    <Td right bold>{fmt(o.sessoes)}</Td>
                    <Td right><span style={{color:'#374151'}}>{fmt(o.usuarios??o.novos)}</span></Td>
                    <Td right>
                      <span className={(o.engajamento??100-o.bounce)<35?'badge-red':(o.engajamento??100-o.bounce)<55?'badge-amber':'badge-green'}>
                        {o.engajamento!=null?o.engajamento+'%':o.bounce!=null?(100-o.bounce).toFixed(1)+'%':'—'}
                      </span>
                    </Td>
                  </>;
                }}
              />
              {oriList.length>KW_PER_PAGE&&(
                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,paddingTop:12,borderTop:'1px solid #f1f5f9'}}>
                  <button onClick={()=>setOrigPage(p=>Math.max(0,p-1))} disabled={origPage===0} style={btnStyleO(origPage===0)}>← Anterior</button>
                  <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                    {pagesO.map((p,idx)=>p==='...'
                      ?<span key={'e'+idx} style={{color:'#94a3b8',fontSize:12,padding:'0 2px'}}>…</span>
                      :<button key={p} onClick={()=>setOrigPage(p)}
                          style={{width:28,height:28,borderRadius:6,border:'1px solid',borderColor:origPage===p?'#6366f1':'#e2e8f0',background:origPage===p?'#6366f1':'#fff',color:origPage===p?'#fff':'#64748b',fontWeight:600,fontSize:12,cursor:'pointer'}}>
                          {p+1}
                        </button>
                    )}
                  </div>
                  <button onClick={()=>setOrigPage(p=>Math.min(totalPagsOrig-1,p+1))} disabled={origPage>=totalPagsOrig-1} style={btnStyleO(origPage>=totalPagsOrig-1)}>Próxima →</button>
                </div>
              )}
            </Bloco>
          );
        })()}

        {/* Timeline */}
        <Bloco titulo="Cliques e Impressões ao Longo do Tempo" sub="Evolução — Search Console" csvDados={timeline} csvNome="seo-timeline.csv">
          <AreaChart2
            labels={timeline.map(d=>d.sem)}
            datasets={[
              {label:'Impressões',data:timeline.map(d=>d.impressoes),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,.08)',yAxisID:'y1'},
              {label:'Cliques',   data:timeline.map(d=>d.cliques),   borderColor:'#10b981',backgroundColor:'rgba(16,185,129,.1)', yAxisID:'y2'},
            ]} h={250}/>
        </Bloco>

        {/* Top Keywords */}
        <Bloco titulo="Top Palavras-chave" sub={gscOk?`Dados reais — GSC · ${kwRows.length} palavras`:'Por posição média — dados de exemplo'} csvDados={kwRows} csvNome="keywords.csv">
          <Tabela
            cols={[{label:'#'},{label:'Palavra-chave'},{label:'Posição',right:true},{label:'Cliques',right:true},{label:'Impressões',right:true}]}
            rows={kwRows.slice(kwPage*KW_PER_PAGE,(kwPage+1)*KW_PER_PAGE)}
            renderRow={(kw,i)=><>
              <Td><span style={{fontSize:11,fontWeight:700,color:'#cbd5e1'}}>{kwPage*KW_PER_PAGE+i+1}</span></Td>
              <Td>{kw.kw}</Td>
              <Td right><span className={kw.pos<=2?'badge-green':kw.pos<=4?'badge-amber':'badge-gray'}>{kw.pos.toFixed(1)}°</span></Td>
              <Td right bold>{fmt(kw.cli)}</Td>
              <Td right><span style={{color:'#64748b'}}>{fmt(kw.vol||0)}</span></Td>
            </>}
          />
          {kwRows.length>KW_PER_PAGE&&(()=>{
            const totalPags=Math.ceil(kwRows.length/KW_PER_PAGE);
            const btnStyle=(disabled)=>({padding:'5px 14px',borderRadius:7,border:'1px solid #e2e8f0',background:disabled?'#f8fafc':'#fff',color:disabled?'#cbd5e1':'#374151',fontWeight:600,fontSize:12,cursor:disabled?'default':'pointer'});
            // janela de páginas: até 7 botões ao redor da atual
            const win=[];
            const delta=3;
            for(let i=0;i<totalPags;i++){
              if(i===0||i===totalPags-1||Math.abs(i-kwPage)<=delta) win.push(i);
            }
            const pages=[];
            let prev=-1;
            win.forEach(i=>{
              if(prev>=0&&i-prev>1) pages.push('...');
              pages.push(i);
              prev=i;
            });
            return(
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,paddingTop:12,borderTop:'1px solid #f1f5f9'}}>
                <button onClick={()=>setKwPage(p=>Math.max(0,p-1))} disabled={kwPage===0} style={btnStyle(kwPage===0)}>← Anterior</button>
                <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                  {pages.map((p,idx)=>p==='...'
                    ? <span key={'e'+idx} style={{color:'#94a3b8',fontSize:12,padding:'0 2px'}}>…</span>
                    : <button key={p} onClick={()=>setKwPage(p)}
                        style={{width:28,height:28,borderRadius:6,border:'1px solid',borderColor:kwPage===p?'#6366f1':'#e2e8f0',background:kwPage===p?'#6366f1':'#fff',color:kwPage===p?'#fff':'#64748b',fontWeight:600,fontSize:12,cursor:'pointer'}}>
                        {p+1}
                      </button>
                  )}
                </div>
                <button onClick={()=>setKwPage(p=>Math.min(totalPags-1,p+1))} disabled={kwPage>=totalPags-1} style={btnStyle(kwPage>=totalPags-1)}>Próxima →</button>
              </div>
            );
          })()}
        </Bloco>

        {/* Palavras-chave de marca */}
        <Bloco titulo="Palavras-chave da Marca Helena CRM" sub={gscOk?`Buscas diretas pela marca — GSC · ${brandKwRows.length} palavras`:'Dados de exemplo'} csvDados={brandKwRows} csvNome="keywords-marca.csv">
          <div style={{marginBottom:12,background:'#eef2ff',border:'1px solid #c7d2fe',borderRadius:8,padding:'9px 12px',fontSize:12,color:'#4338ca'}}>
            💡 Buscas pela marca indicam reconhecimento e reputação. Crescimento aqui = autoridade construída.
          </div>
          <Tabela
            cols={[{label:'Palavra-chave'},{label:'Posição',right:true},{label:'Impressões',right:true},{label:'Cliques',right:true},{label:'CTR',right:true}]}
            rows={brandKwRows.slice(brandPage*KW_PER_PAGE,(brandPage+1)*KW_PER_PAGE)}
            renderRow={(kw,i)=><>
              <Td><span style={{fontWeight:500,color:'#374151'}}>{kw.kw}</span></Td>
              <Td right><span className="badge-green">{kw.pos.toFixed(1)}°</span></Td>
              <Td right><span style={{color:'#64748b'}}>{fmt(kw.vol)}</span></Td>
              <Td right bold>{fmt(kw.cli)}</Td>
              <Td right><span style={{color:'#64748b'}}>{gscOk?kw.ctr+'%':'+'+kw.var+'%'}</span></Td>
            </>}
          />
          {brandKwRows.length>KW_PER_PAGE&&(()=>{
            const totalPags=Math.ceil(brandKwRows.length/KW_PER_PAGE);
            const btnStyle=(disabled)=>({padding:'5px 14px',borderRadius:7,border:'1px solid #e2e8f0',background:disabled?'#f8fafc':'#fff',color:disabled?'#cbd5e1':'#374151',fontWeight:600,fontSize:12,cursor:disabled?'default':'pointer'});
            const win=[];const delta=3;
            for(let i=0;i<totalPags;i++){if(i===0||i===totalPags-1||Math.abs(i-brandPage)<=delta)win.push(i);}
            const pages=[];let prev=-1;
            win.forEach(i=>{if(prev>=0&&i-prev>1)pages.push('...');pages.push(i);prev=i;});
            return(
              <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginTop:12,paddingTop:12,borderTop:'1px solid #f1f5f9'}}>
                <button onClick={()=>setBrandPage(p=>Math.max(0,p-1))} disabled={brandPage===0} style={btnStyle(brandPage===0)}>← Anterior</button>
                <div style={{display:'flex',gap:4,alignItems:'center',flexWrap:'wrap'}}>
                  {pages.map((p,idx)=>p==='...'
                    ?<span key={'e'+idx} style={{color:'#94a3b8',fontSize:12,padding:'0 2px'}}>…</span>
                    :<button key={p} onClick={()=>setBrandPage(p)}
                        style={{width:28,height:28,borderRadius:6,border:'1px solid',borderColor:brandPage===p?'#6366f1':'#e2e8f0',background:brandPage===p?'#6366f1':'#fff',color:brandPage===p?'#fff':'#64748b',fontWeight:600,fontSize:12,cursor:'pointer'}}>
                        {p+1}
                      </button>
                  )}
                </div>
                <button onClick={()=>setBrandPage(p=>Math.min(totalPags-1,p+1))} disabled={brandPage>=totalPags-1} style={btnStyle(brandPage>=totalPags-1)}>Próxima →</button>
              </div>
            );
          })()}
        </Bloco>

        {/* Páginas mais acessadas */}
        <Bloco titulo="Páginas Mais Acessadas" sub={gscOk?'Por cliques orgânicos — GSC':'Top tráfego orgânico — dados de exemplo'} csvDados={topPags} csvNome="top-paginas.csv">
          <Tabela
            cols={[{label:'Página'},{label:gscOk?'Cliques':'Sessões',right:true},{label:'Bounce',right:true},{label:'Tempo',right:true},{label:'Variação',right:true}]}
            rows={topPags}
            renderRow={(p,i)=><>
              <Td><span style={{fontFamily:'monospace',fontSize:12,color:'#6366f1',background:'#eef2ff',padding:'2px 7px',borderRadius:5}}>{p.url}</span></Td>
              <Td right bold>{fmt(p.ses)}</Td>
              <Td right><span style={{color:'#64748b'}}>{p.bounce}</span></Td>
              <Td right><span style={{color:'#64748b'}}>{p.tempo}</span></Td>
              <Td right><span className={p.var>=0?'badge-up':'badge-dn'}>{p.var>=0?'+':''}{p.var}%</span></Td>
            </>}
          />
        </Bloco>

        {/* Páginas menos acessadas */}
        <Bloco titulo="Páginas com Baixo Tráfego" sub={gscOk?'Menor volume de cliques orgânicos — GSC':'Dados de exemplo'} csvDados={botPags} csvNome="paginas-baixo-trafego.csv">
          <Tabela
            cols={[{label:'Página'},{label:gscOk?'Cliques':'Sessões',right:true},{label:'Bounce',right:true},{label:'Oportunidade'}]}
            rows={botPags}
            renderRow={(p,i)=><>
              <Td><span style={{fontFamily:'monospace',fontSize:12,color:'#ef4444',background:'#fef2f2',padding:'2px 7px',borderRadius:5}}>{p.url}</span></Td>
              <Td right><span style={{color:'#64748b'}}>{p.ses}</span></Td>
              <Td right><span className="badge-red">{p.bounce}</span></Td>
              <td style={{padding:'9px 12px',fontSize:12,color:'#64748b'}}>{p.opp}</td>
            </>}
          />
        </Bloco>

        {/* Oportunidades de crescimento */}
        <Bloco titulo="🚀 Oportunidades de Crescimento" sub="Páginas com muitas impressões mas baixo CTR — alto potencial de melhoria" csvDados={opps} csvNome="oportunidades-seo.csv">
          <div style={{marginBottom:12,background:'#f0fdf4',border:'1px solid #bbf7d0',borderRadius:8,padding:'9px 12px',fontSize:12,color:'#166534'}}>
            💡 Estas páginas já aparecem bem no Google, mas poucas pessoas clicam. Melhorar title e meta description pode multiplicar o tráfego sem esforço de link building.
          </div>
          {opps.map((o,i)=>(
            <div key={i} className="opp-row">
              <div style={{flex:'0 0 32px',height:32,borderRadius:8,background:o.potencial==='alto'?'#fef2f2':'#fffbeb',
                display:'flex',alignItems:'center',justifyContent:'center',fontSize:16}}>
                {o.potencial==='alto'?'🔥':'⚡'}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
                  <span style={{fontFamily:'monospace',fontSize:12,color:'#6366f1',background:'#eef2ff',padding:'2px 7px',borderRadius:5}}>{o.url}</span>

    const AbaEstrategia=({api,diasApi=30,de,ate})=>{
      const [openAcao,setOpenAcao]=useState(null);
      const toMK=d=>d?String(d.getFullYear())+String(d.getMonth()+1).padStart(2,'0'):'';
      const startKey=toMK(de);
      const endKey=toMK(ate);

      // === FONTES DE DADOS ===
      const gscOk=!!(api?.gsc?.keywords?.length||api?.gsc?.historico?.length);
      const ga4Ok=!!(api?.ga4?.canais?.length);
      const smOk=!!(api?.semrush?.dominio?.keywords);
      const dataOk=gscOk||ga4Ok||smOk;

      // GSC
      const _gscHist=api?.gsc?.historico||[];
      const gscImp=_gscHist.length ? _gscHist.reduce((s,t)=>s+t.impressoes,0) : (api?.gsc?.impressoes||0);
      const gscCli=_gscHist.length ? _gscHist.reduce((s,t)=>s+t.cliques,0)   : (api?.gsc?.cliques||0);
      const gscKws=api?.gsc?.keywords||[];
      const gscCtr=gscImp>0?(gscCli/gscImp*100):(api?.gsc?.ctrMedio||0);
      const gscPos=gscKws.length ? gscKws.reduce((s,k)=>s+k.posicao,0)/gscKws.length : (api?.gsc?.posicaoMedia||0);

      // GA4
      const ga4Canais=api?.ga4?.canais||[];
      const ga4Total=ga4Canais.length ? ga4Canais.reduce((s,c)=>s+c.sessoes,0) : (api?.ga4?.totalSessoes||0);
      const ga4Org=ga4Canais.length ? (ga4Canais.find(c=>c.canal==='Organic Search')?.sessoes||0) : (api?.ga4?.sessoes||0);
      const ga4Bounce=ga4Canais.length&&ga4Total>0 ? ga4Canais.reduce((s,c)=>s+(c.bounce*(c.sessoes/ga4Total)),0) : (api?.ga4?.bounceRate||0);
      const orgRatio=ga4Total>0?(ga4Org/ga4Total*100):0;

      // SEMrush — deduplica por melhor posição
      const smRaw=api?.semrush?.keywords||[];
      const kwMap={}; smRaw.forEach(k=>{if(!kwMap[k.kw]||k.posicao<kwMap[k.kw].posicao)kwMap[k.kw]=k;});
      const smKws=Object.values(kwMap);
      const smDef=smKws.filter(k=>k.posicao<=3);
      const smAtacar=smKws.filter(k=>k.posicao>=4&&k.posicao<=20).sort((a,b)=>b.volume-a.volume);
      const smCapt=smKws.filter(k=>k.posicao>20).sort((a,b)=>b.volume-a.volume);
      const smTotal=api?.semrush?.dominio?.keywords||0;
      const smTraf=api?.semrush?.dominio?.traffic||0;
      const smConc=api?.semrush?.concorrentes||[];

      if(gscImp>100000) ondeEstaBem.push(`${gscImp.toLocaleString('pt-BR')} impressões em ${diasApi} dias — boa visibilidade no Google`);
      if(leadsOk&&mqlRate>=15) ondeEstaBem.push(`Taxa MQL+SQL de ${mqlRate.toFixed(1)}% — funil com boa qualificação`);
      if(leadsOk&&wlRate>=25) ondeEstaBem.push(`${wlRate.toFixed(0)}% dos leads são White Label — segmento de alto valor ativo`);
      if(leadsOk&&orgLeadRate>=30) ondeEstaBem.push(`${orgLeadRate.toFixed(0)}% dos leads vêm de orgânico — aquisição sustentável`);
      if(ondeEstaBem.length===0) ondeEstaBem.push('Dados conectados e monitoramento ativo de todos os canais');

      const maioresOps=[];
      if(topAtak) maioresOps.push(`"${topAtak.kw}" em #${topAtak.posicao} com ${topAtak.volume.toLocaleString('pt-BR')} buscas/mês — maior oportunidade SEO agora`);
      if(gscLowCtr.length>0) maioresOps.push(`${gscLowCtr.length} páginas perdendo cliques por snippets fracos — ganho rápido sem criar conteúdo`);
      if(ga4Bounce>55) maioresOps.push(`Bounce de ${ga4Bounce.toFixed(1)}% indica gap de UX/conversão nas páginas de entrada`);
      if(leadsOk&&mqlRate<10) maioresOps.push(`Taxa MQL de ${mqlRate.toFixed(1)}% — otimizar qualificação pode dobrar oportunidades quentes`);
      if(leadsOk&&pagoRate>75) maioresOps.push(`${pagoRate.toFixed(0)}% de leads pagos — diversificar canal reduz risco e CAC`);
      if(topDir&&topDir.traffic>smTraf*2) maioresOps.push(`${topDir.domain} com ${topDir.traffic.toLocaleString('pt-BR')} visitas/mês — concorrente direto a fechar gap`);

      const proximosPassos=[];
      if(leadsOk&&mqlRate<10) proximosPassos.push(`Revisar critério de MQL no CRM — taxa atual de ${mqlRate.toFixed(1)}% está abaixo do ideal`);
      if(topAtak) proximosPassos.push(`Otimizar "${topAtak.kw}" — H1, meta description e FAQ schema`);
      if(gscLowCtr.length>0) proximosPassos.push(`Reescrever title/meta das ${gscLowCtr.length} páginas com CTR < 2%`);
      if(smDef.length>0) proximosPassos.push(`Monitorar keywords top 3 — defesa de posição conquistada`);
      if(topCapt.length>0) proximosPassos.push(`Planejar artigo para "${topCapt[0]?.kw}" (${topCapt[0]?.volume?.toLocaleString('pt-BR')}/mês)`);
      if(leadsOk&&wlRate<20) proximosPassos.push(`Criar LP dedicada para White Label — segmento com maior valor de contrato`);

      const pColor=p=>p==='alta'?'#dc2626':p==='média'?'#d97706':'#6366f1';
      const pBg=p=>p==='alta'?'#fef2f2':p==='média'?'#fffbeb':'#eef2ff';

            </div>
            {/* Insights cruzados */}
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(240px,1fr))',gap:10}}>
              {[
                pagoConvPct>0&&orgConvPct>0&&{
                  ic:pagoConvPct>orgConvPct?'📣':'🌱',
                  txt:`Leads ${pagoConvPct>orgConvPct?'pagos':'orgânicos'} convertem ${Math.abs(pagoConvPct-orgConvPct).toFixed(1)}pp ${pagoConvPct>orgConvPct?'mais':'menos'} — pago ${pagoConvPct.toFixed(1)}% MQL vs orgânico ${orgConvPct.toFixed(1)}%`,

                },
                topConvCanal&&{
                  ic:'🏆',
                  txt:`Canal com maior taxa de conversão: ${topConvCanal.canal} — ${((topConvCanal.mql+topConvCanal.sql)/topConvCanal.count*100).toFixed(1)}% MQL+SQL de ${topConvCanal.count} leads`,
                  color:'#7c3aed',bg:'#f5f3ff',
                },
                orgRatio>0&&orgLeadRate>0&&Math.abs(orgRatio-orgLeadRate)>10&&{
                  ic:orgRatio>orgLeadRate?'⚠️':'✅',
                  txt:orgRatio>orgLeadRate
                    ?`Orgânico gera ${orgRatio.toFixed(0)}% do tráfego mas só ${orgLeadRate.toFixed(0)}% dos leads — gap de conversão orgânica`
                    :`Orgânico gera ${orgLeadRate.toFixed(0)}% dos leads com apenas ${orgRatio.toFixed(0)}% do tráfego — alta eficiência`,

                },
                topVolCanal&&{
                  ic:'📊',
                  txt:`Maior volume: ${topVolCanal.canal} com ${topVolCanal.count} leads · CF: ${topVolCanal.cf} · WL: ${topVolCanal.wl}`,

              ].filter(Boolean).slice(0,4).map((ins,i)=>(
                <div key={i} style={{background:ins.bg,borderRadius:10,padding:'10px 14px',display:'flex',gap:10,alignItems:'flex-start'}}>
                  <span style={{fontSize:16,flexShrink:0,marginTop:1}}>{ins.ic}</span>
                  <p style={{fontSize:12,color:ins.color,fontWeight:600,margin:0,lineHeight:1.45}}>{ins.txt}</p>
                </div>

            </div>
          </div>
          )}

          <div style={{display:'grid',gridTemplateColumns:'200px 1fr',gap:16,alignItems:'start'}}>
            <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)',textAlign:'center',display:'flex',flexDirection:'column',alignItems:'center',gap:8}}>
              <p style={{fontSize:10,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',letterSpacing:'.06em',margin:0}}>Score de Saúde Digital</p>
              <div style={{position:'relative',width:100,height:100}}>
                <svg viewBox="0 0 100 100" style={{transform:'rotate(-90deg)',width:100,height:100}}>

                    strokeDasharray={`${2*Math.PI*42*overallScore/100} ${2*Math.PI*42}`} strokeLinecap="round"/>

                <div style={{position:'absolute',inset:0,display:'flex',flexDirection:'column',alignItems:'center',justifyContent:'center'}}>

              {pilares.map((p,i)=>{
                const col=p.score>=80?'#10b981':p.score>=65?'#6366f1':p.score>=50?'#f59e0b':'#ef4444';
                const bg=p.score>=80?'#ecfdf5':p.score>=65?'#eef2ff':p.score>=50?'#fffbeb':'#fef2f2';
                const lbl=p.score>=80?'Ótimo':p.score>=65?'Bom':p.score>=50?'Atenção':'Crítico';
                return (
                  <div key={i} style={{background:'#fff',borderRadius:12,padding:14,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>

                      <div style={{display:'flex',alignItems:'center',gap:8}}>
                        <span style={{fontSize:15}}>{p.ic}</span>
                        <p style={{fontSize:12,fontWeight:700,color:'#1e293b',margin:0}}>{p.area}</p>

                      <div style={{display:'flex',alignItems:'center',gap:6}}>

                        <span style={{fontSize:10,color:'#94a3b8'}}>/100</span>
                      </div>
                    </div>
                    <div style={{height:5,background:'#f1f5f9',borderRadius:3,overflow:'hidden',marginBottom:6}}>
                      <div style={{height:'100%',width:p.score+'%',background:col,borderRadius:3}}/>
                    </div>
                    <p style={{fontSize:11,color:'#64748b',margin:0}}>{p.desc}</p>
                  </div>
                );
              })}
            </div>
          </div>

          {/* Plano de ação expandível */}
          <div style={{background:'#fff',borderRadius:12,padding:20,boxShadow:'0 1px 4px rgba(0,0,0,.06)'}}>
            <div style={{display:'flex',alignItems:'center',gap:10,marginBottom:16}}>

                    </div>

                        borderRadius:8,borderLeft:'3px solid #6366f1'}}>
                        <p style={{fontSize:11,fontWeight:600,color:'#4338ca',margin:0}}>
                          → {pg.acoesPagina.includes('otimizar_on_page')&&pg.acoesPagina.includes('melhorar_snippet')?'Otimizar on-page + reescrever snippet (duplo impacto)':
                             pg.acoesPagina.includes('otimizar_on_page')?`Otimizar on-page: H1, meta e FAQ para "${[...pg.atacar].sort((a,b)=>b.vol-a.vol)[0]?.kw}"`:
                             pg.acoesPagina.includes('melhorar_snippet')?`Reescrever title tag e meta description — CTR de ${pg.gscMatch?.ctr.toFixed(1)}% está abaixo de 2%`:
                             'Enriquecer conteúdo para subir zona Capturar → Atacar'}
                        </p>
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          </div>
          )}

          {/* Resumo executivo dinâmico */}
          <div style={{background:'linear-gradient(135deg,#1e1b4b 0%,#312e81 100%)',borderRadius:12,padding:20}}>
            <div style={{display:'flex',gap:10,marginBottom:16,alignItems:'center'}}>
              <span style={{fontSize:22}}>🧠</span>
              <h4 style={{fontSize:14,fontWeight:700,color:'#fff',margin:0}}>Resumo Executivo — Diagnóstico com Dados Reais</h4>
            </div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(250px,1fr))',gap:12}}>
              {[
                {t:'Onde estamos bem',ic:'✅',items:ondeEstaBem},
                {t:'Maior oportunidade',ic:'🎯',items:maioresOps},
                {t:'Próximo passo crítico',ic:'⚡',items:proximosPassos},
              ].map((col,i)=>(
                <div key={i} style={{background:'rgba(255,255,255,.08)',borderRadius:10,padding:14}}>
                  <p style={{fontSize:12,fontWeight:700,color:'rgba(255,255,255,.6)',margin:'0 0 10px',
                    display:'flex',gap:6,alignItems:'center'}}>
                    <span>{col.ic}</span>{col.t}
                  </p>
                  {col.items.map((it,j)=>(
                    <div key={j} style={{display:'flex',gap:8,marginBottom:7}}>
                      <span style={{color:'rgba(255,255,255,.4)',fontSize:11,marginTop:1,flexShrink:0}}>→</span>
                      <p style={{fontSize:12,color:'rgba(255,255,255,.85)',margin:0,lineHeight:1.4}}>{it}</p>
                    </div>
                  ))}
                </div>
              ))}
            </div>
          </div>

        </div>
      );
    };

    /* ══════════════════════════════════════════════
       APP PRINCIPAL
    ══════════════════════════════════════════════ */

    const ABAS=[{id:'leads',label:'Leads',ic:'👥'},{id:'seo',label:'SEO',ic:'🔍'},{id:'email',label:'E-mail Marketing',ic:'✉️'},{id:'funil',label:'Funil',ic:'📊'},{id:'estrategia',label:'Estratégia & IA',ic:'🤖'}];

    // Período inicial: últimos 30 dias
    const makeDate=(diasAtras)=>{ const d=new Date(TODAY); d.setDate(d.getDate()-diasAtras); return d; };

    const App=()=>{
      const [aba,setAba]=useState('leads');
      const [tipo,setTipo]=useState('all');
      const [de,setDe]=useState(makeDate(30));
      const [ate,setAte]=useState(TODAY);
      const [showCal,setShowCal]=useState(false);
      const [api,setApi]=useState(null);
      const [apiStatus,setApiStatus]=useState('carregando');
      const [diasApi,setDiasApi]=useState(30);

      useEffect(()=>{
        setApiStatus('carregando');
        fetch(API_URL+'?dias='+diasApi)
          .then(r=>r.json())
          .then(d=>{ setApi(d); setApiStatus('ok'); })
          .catch(()=>setApiStatus('erro'));
      },[diasApi]);

      const ATALHOS=[
        {l:'7 dias', fn:()=>{ setDe(makeDate(7));  setAte(TODAY); setDiasApi(7);  setShowCal(false); }},
        {l:'30 dias',fn:()=>{ setDe(makeDate(30)); setAte(TODAY); setDiasApi(30); setShowCal(false); }},
        {l:'90 dias',fn:()=>{ setDe(makeDate(90)); setAte(TODAY); setDiasApi(90); setShowCal(false); }},
        {l:'Este mês',fn:()=>{ const d=new Date(TODAY); d.setDate(1); setDe(d); setAte(TODAY); setShowCal(false); }},
        {l:'Ano atual',fn:()=>{ const d=new Date(TODAY); d.setMonth(0,1); setDe(d); setAte(TODAY); setShowCal(false); }},
      ];

      const TIPOS=[{l:'Todos',v:'all'},{l:'Cliente Final',v:'cliente_final'},{l:'White Label',v:'white_label'}];

      const Pill=({opts,val,set})=>(
        <div style={{background:'#f1f5f9',borderRadius:8,padding:3,display:'flex',gap:2}}>
          {opts.map(o=>(
            <button key={o.v} onClick={()=>set(o.v)}
              style={{padding:'4px 12px',borderRadius:6,border:'none',cursor:'pointer',fontSize:12,fontWeight:500,background:'none',transition:'all .15s'}}
              className={val===o.v?'pill-a':'pill-i'}>{o.l}</button>
          ))}
        </div>
      );

      const diasDiff=Math.round((ate-de)/(1000*60*60*24));

      return (
        <div style={{minHeight:'100vh',background:'#f8fafc'}}>

          {/* Header */}
          <header style={{background:'#fff',borderBottom:'1px solid #e2e8f0',position:'sticky',top:0,zIndex:50}}>
            <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px',display:'flex',alignItems:'center',justifyContent:'space-between',height:64}}>
              <div style={{display:'flex',alignItems:'center',gap:12}}>
                <img src="/logos/logo_helena_simbolo_colorido (1).png" style={{height:38,width:'auto'}} alt="Helena"/>
                <div>
                  <h1 style={{fontSize:15,fontWeight:800,color:'#0f172a',margin:0,lineHeight:1}}>HelenaCRM - Painel de Marketing</h1>
                </div>
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                {apiStatus==='ok'
                  ? <span style={{fontSize:11,background:'#f0fdf4',color:'#166534',border:'1px solid #bbf7d0',padding:'5px 10px',borderRadius:7}}>✅ GSC + GA4 conectados</span>
                  : apiStatus==='carregando'
                  ? <span style={{fontSize:11,background:'#f1f5f9',color:'#64748b',border:'1px solid #e2e8f0',padding:'5px 10px',borderRadius:7}}>⏳ Conectando APIs…</span>
                  : <span style={{fontSize:11,background:'#fffbeb',color:'#92400e',border:'1px solid #fde68a',padding:'5px 10px',borderRadius:7}}>⚠ Dados de exemplo</span>
                }
                <button onClick={()=>exportarCSV((api?.leads?.recentes||[]).map(l=>({data:l.data,nome:l.nome,canal:l.canal,tipo:l.tipo,status:l.status})),`leads-${toInput(de)}-${toInput(ate)}.csv`)}
                  style={{background:'#6366f1',color:'#fff',border:'none',borderRadius:8,padding:'7px 14px',fontSize:13,fontWeight:600,cursor:'pointer',display:'flex',alignItems:'center',gap:6}}>
                  <IDl/> Exportar CSV
                </button>
              </div>
            </div>
          </header>

          {/* Filtros */}
          <div style={{background:'#fff',borderBottom:'1px solid #f1f5f9',position:'sticky',top:64,zIndex:40}}>
            <div style={{maxWidth:1280,margin:'0 auto',padding:'10px 24px',display:'flex',flexWrap:'wrap',alignItems:'center',gap:10}}>

              {/* Período — calendário livre */}
              <div style={{position:'relative'}}>
                <button onClick={()=>setShowCal(!showCal)}
                  style={{display:'flex',alignItems:'center',gap:7,padding:'6px 12px',borderRadius:8,border:'1px solid #e2e8f0',background:'#fff',fontSize:12,fontWeight:600,color:'#374151',cursor:'pointer',whiteSpace:'nowrap'}}>
                  <ICal/>
                  {fmtDate(de)} → {fmtDate(ate)}
                  <span style={{fontSize:10,background:'#eef2ff',color:'#6366f1',padding:'1px 6px',borderRadius:10,marginLeft:4}}>{diasDiff}d</span>
                  <span style={{fontSize:10,color:'#94a3b8'}}>▾</span>
                </button>

                {showCal&&(
                  <div style={{position:'absolute',top:'calc(100% + 6px)',left:0,background:'#fff',border:'1px solid #e2e8f0',borderRadius:12,padding:16,boxShadow:'0 8px 24px rgba(0,0,0,.12)',zIndex:100,minWidth:320}}>
                    <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',marginBottom:8}}>Atalhos rápidos</p>
                    <div style={{display:'flex',flexWrap:'wrap',gap:6,marginBottom:14}}>
                      {ATALHOS.map((a,i)=>(
                        <button key={i} onClick={a.fn}
                          style={{padding:'4px 10px',borderRadius:6,border:'1px solid #e2e8f0',background:'#f8fafc',fontSize:12,fontWeight:500,color:'#374151',cursor:'pointer'}}>
                          {a.l}</button>
                      ))}
                    </div>
                    <p style={{fontSize:11,fontWeight:700,color:'#94a3b8',textTransform:'uppercase',marginBottom:8}}>Período personalizado</p>
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <div style={{flex:1}}>
                        <p style={{fontSize:10,color:'#94a3b8',margin:'0 0 4px',fontWeight:600}}>DE</p>
                        <input type="date" value={toInput(de)}
                          max={toInput(ate)}
                          onChange={e=>{ if(e.target.value) setDe(new Date(e.target.value+'T00:00:00')); }}
                          style={{width:'100%'}}/>
                      </div>
                      <span style={{color:'#94a3b8',marginTop:16}}>→</span>
                      <div style={{flex:1}}>
                        <p style={{fontSize:10,color:'#94a3b8',margin:'0 0 4px',fontWeight:600}}>ATÉ</p>
                        <input type="date" value={toInput(ate)}
                          min={toInput(de)} max={toInput(TODAY)}
                          onChange={e=>{ if(e.target.value) setAte(new Date(e.target.value+'T23:59:59')); }}
                          style={{width:'100%'}}/>
                      </div>
                    </div>
                    <button onClick={()=>setShowCal(false)}
                      style={{marginTop:12,width:'100%',padding:'7px',background:'#6366f1',color:'#fff',border:'none',borderRadius:8,fontSize:13,fontWeight:600,cursor:'pointer'}}>
                      Aplicar período
                    </button>
                  </div>
                )}
              </div>


              <span style={{marginLeft:'auto',fontSize:11,color:'#cbd5e1'}}>
                Atualizado: {api?.atualizado ? new Date(api.atualizado).toLocaleDateString('pt-BR',{day:'2-digit',month:'2-digit',year:'numeric',hour:'2-digit',minute:'2-digit'}) : fmtDate(TODAY)}
              </span>
            </div>
          </div>

          {/* Tabs */}
          <div style={{maxWidth:1280,margin:'0 auto',padding:'0 24px'}}>
            <div style={{display:'flex',borderBottom:'1px solid #e2e8f0'}}>
              {ABAS.map(a=>(
                <button key={a.id} onClick={()=>setAba(a.id)}
                  style={{display:'flex',alignItems:'center',gap:7,padding:'14px 16px',fontSize:13,fontWeight:500,border:'none',background:'none',cursor:'pointer',whiteSpace:'nowrap',transition:'all .15s'}}
                  className={aba===a.id?'tab-a':'tab-i'}>
                  <span>{a.ic}</span><span>{a.label}</span>
                </button>
              ))}
            </div>
          </div>

          {/* Content */}
          <main style={{maxWidth:1280,margin:'0 auto',padding:24}}>
            {aba==='leads'     && <AbaLeads de={de} ate={ate} tipo={tipo} api={api}/>}
            {aba==='seo'       && <AbaSEO api={api} diasApi={diasApi}/>}
            {aba==='email'     && <AbaEmail/>}
            {aba==='funil'     && <AbaFunil api={api} de={de} ate={ate}/>}
            {aba==='estrategia'&& <AbaEstrategia api={api} diasApi={diasApi} de={de} ate={ate}/>}
          </main>

          <footer style={{maxWidth:1280,margin:'0 auto',padding:'20px 24px',borderTop:'1px solid #f1f5f9'}}>
            <p style={{fontSize:11,color:'#cbd5e1',textAlign:'center',margin:0}}>
              Painel de Marketing · helena · Conecte suas APIs para dados reais
            </p>
          </footer>
        </div>
      );
    };

    ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  });
  </script>
</body>
</html>
